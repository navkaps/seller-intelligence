<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Seller Systems Support Intelligence</title>
  <script src="./chart.min.js"></script>
  <style>
    :root {
      --bg:           #F6F9FC;
      --surface:      #FFFFFF;
      --surface-2:    #F6F9FC;
      --border:       #E3E8EE;
      --border-2:     #F0F4F8;
      --purple:       #635BFF;
      --purple-dim:   rgba(99,91,255,0.08);
      --purple-dark:  #4F46E5;
      --green:        #30B980;
      --green-dim:    rgba(48,185,128,0.08);
      --yellow:       #C27A00;
      --yellow-dim:   rgba(194,122,0,0.08);
      --red:          #DF1B41;
      --red-dim:      rgba(223,27,65,0.08);
      --orange:       #FF7B00;
      --orange-dim:   rgba(255,123,0,0.08);
      --teal:         #0096A5;
      --teal-dim:     rgba(0,150,165,0.08);
      --text-1:       #0A2540;
      --text-2:       #425466;
      --text-3:       #8898AA;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { overflow-x: auto; scroll-behavior: smooth; }
    .diff-badge { display: inline-flex; align-items: center; gap: 4px; font-size: 10px; font-weight: 700; padding: 3px 9px; border-radius: 20px; white-space: nowrap; }
    .diff-up   { background: var(--red-dim);   color: var(--red);   border: 1px solid rgba(223,27,65,0.25); }
    .diff-down { background: var(--green-dim); color: var(--green); border: 1px solid rgba(48,185,128,0.3); }
    .diff-flat { background: var(--surface-2); color: var(--text-3); border: 1px solid var(--border); }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", sans-serif;
      background: var(--bg); color: var(--text-2);
      min-height: 100vh; font-size: 13px; line-height: 1.5; min-width: 900px;
    }
    a { color: var(--purple); text-decoration: none; }
    a:hover { text-decoration: underline; }
    .page { max-width: 1360px; margin: 0 auto; padding: 0 28px; }

    /* Header */
    .header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 14px 0; }
    .header-inner { max-width: 1360px; margin: 0 auto; padding: 0 28px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
    .header-left { display: flex; align-items: center; gap: 14px; }
    .stripe-logo { width: 28px; height: 28px; background: var(--purple-dark); border-radius: 5px; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 800; color: white; }
    .header-title h1 { font-size: 15px; font-weight: 600; color: var(--text-1); }
    .header-title p  { font-size: 11px; color: var(--text-3); margin-top: 1px; }
    .header-right { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .run-badge { background: var(--purple-dim); border: 1px solid rgba(99,91,255,0.3); padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 600; color: var(--purple); }
    .ch-link { font-size: 11px; background: var(--surface-2); border: 1px solid var(--border); padding: 4px 10px; border-radius: 4px; }
    .ch-link a { color: var(--text-2); }

    /* Nav */
    .nav-bar { background: var(--surface); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
    .nav-inner { max-width: 1360px; margin: 0 auto; padding: 0 28px; display: flex; overflow-x: auto; }
    .nav-tab { font-size: 11px; font-weight: 600; color: var(--text-3); padding: 10px 14px; border-bottom: 2px solid transparent; white-space: nowrap; text-decoration: none; display: block; transition: color 0.15s; }
    .nav-tab:hover { color: var(--text-1); text-decoration: none; }
    .nav-tab.active { color: var(--purple); border-bottom-color: var(--purple); }

    /* Copy button */
    .copy-btn { display: inline-flex; align-items: center; gap: 3px; font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 4px; border: 1px solid var(--border); background: var(--surface-2); color: var(--text-3); cursor: pointer; transition: all 0.15s; line-height: 1.4; }
    .copy-btn:hover { background: var(--purple-dim); color: var(--purple); border-color: rgba(99,91,255,0.3); }
    .copy-btn.copied { background: var(--green-dim); color: var(--green); border-color: rgba(48,185,128,0.3); }

    .section { padding: 16px 0 0; }
    .section.last { padding-bottom: 32px; }

    /* BLUF */
    .bluf { background: var(--surface); border: 1px solid var(--border); border-left: 3px solid var(--purple); border-radius: 0 6px 6px 0; padding: 16px 20px; }
    .bluf-label { font-size: 10px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase; color: var(--purple); margin-bottom: 6px; }
    .bluf p { font-size: 13px; line-height: 1.8; color: var(--text-2); margin: 0 0 12px; }
    .bluf p:last-child { margin-bottom: 0; }
    .bluf strong { color: var(--text-1); font-weight: 700; }
    .bluf p .bluf-head { color: var(--purple); font-weight: 700; font-size: 13px; }

    /* KPIs */
    .kpi-row { display: grid; grid-template-columns: repeat(7, minmax(0, 1fr)); gap: 1px; background: var(--border); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
    .kpi { background: var(--surface); padding: 12px 14px; min-width: 0; overflow: hidden; }
    .kpi-label { font-size: 9.5px; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; color: var(--text-3); margin-bottom: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .kpi-value { font-size: 22px; font-weight: 700; color: var(--text-1); line-height: 1; }
    .kpi-sub { font-size: 10.5px; margin-top: 4px; }
    .up { color: var(--red); } .down { color: var(--green); } .flat { color: var(--text-3); }

    /* Pulse */
    .pulse-grid { display: grid; grid-template-columns: repeat(5, minmax(0, 1fr)); gap: 10px; }
    .pulse-card { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 14px 16px; }
    .pulse-card-label { font-size: 10px; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; color: var(--text-3); margin-bottom: 6px; }
    .pulse-card-issue { font-size: 12px; color: var(--text-1); font-weight: 600; line-height: 1.4; margin-bottom: 6px; }
    .pulse-card-detail { font-size: 11px; color: var(--text-2); line-height: 1.5; }
    .pulse-card-link { display: inline-block; margin-top: 8px; font-size: 10px; color: var(--purple); background: var(--purple-dim); border: 1px solid rgba(99,91,255,0.25); padding: 2px 8px; border-radius: 3px; text-decoration: none; font-weight: 500; }
    .pulse-r { border-top: 2px solid var(--red); }
    .pulse-o { border-top: 2px solid var(--orange); }
    .pulse-y { border-top: 2px solid var(--yellow); }
    .pulse-g { border-top: 2px solid var(--green); }
    .pulse-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
    .pulse-pill { font-size: 10px; font-weight: 700; letter-spacing: 0.8px; text-transform: uppercase; color: var(--red); background: var(--red-dim); border: 1px solid rgba(223,27,65,0.25); padding: 3px 10px; border-radius: 20px; }
    .pulse-meta { font-size: 11px; color: var(--text-3); }
    .pulse-meta strong { color: var(--text-1); }

    /* Card */
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 20px 22px; }
    .card-title { font-size: 10px; font-weight: 700; letter-spacing: 0.8px; text-transform: uppercase; color: var(--text-3); margin-bottom: 16px; }

    /* Issue table */
    .tbl-wrap { overflow-x: auto; }
    .tbl { width: 100%; border-collapse: collapse; min-width: 760px; }
    .tbl th { font-size: 10px; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; color: rgba(255,255,255,0.85); text-align: left; padding: 8px 10px 8px 0; background: var(--purple-dark); }
    .tbl th:first-child { padding-left: 10px; }
    .tbl th.c { text-align: center; }
    .tbl td { padding: 9px 10px 9px 0; font-size: 12px; color: var(--text-2); border-bottom: 1px solid var(--border-2); vertical-align: middle; }
    .tbl tr:last-child td { border-bottom: none; }
    .tbl td.label { color: var(--text-1); font-weight: 500; }
    .tbl td.c { text-align: center; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 10px; font-weight: 600; white-space: nowrap; }
    .b-crit { background: var(--red-dim); color: var(--red); border: 1px solid rgba(223,27,65,0.25); }
    .b-high { background: var(--orange-dim); color: var(--orange); border: 1px solid rgba(196,77,0,0.25); }
    .b-med  { background: var(--yellow-dim); color: var(--yellow); border: 1px solid rgba(194,122,0,0.25); }
    .b-low  { background: var(--green-dim); color: var(--green); border: 1px solid rgba(14,138,95,0.25); }
    .t-up   { color: var(--red); font-weight: 700; }
    .t-flat { color: var(--text-3); }
    .t-down { color: var(--green); font-weight: 700; }
    .sl { display: inline-flex; align-items: center; font-size: 10px; color: var(--purple); background: var(--purple-dim); border: 1px solid rgba(99,91,255,0.25); padding: 2px 7px; border-radius: 3px; text-decoration: none; font-weight: 500; white-space: nowrap; }

    /* Two-col */
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

    /* Actions */
    .action { display: flex; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border-2); align-items: flex-start; }
    .action:last-child { border-bottom: none; }
    .action-n { width: 20px; height: 20px; min-width: 20px; background: var(--purple-dim); border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; color: var(--purple); }
    .action-body { font-size: 12px; color: var(--text-2); line-height: 1.5; }
    .action-body strong { color: var(--text-1); }
    .action-owner { font-size: 10px; color: var(--text-3); margin-top: 2px; }

    /* Watchlist */
    .watch { display: flex; gap: 10px; padding: 9px 0; border-bottom: 1px solid var(--border-2); align-items: flex-start; }
    .watch:last-child { border-bottom: none; }
    .dot { width: 6px; height: 6px; min-width: 6px; border-radius: 50%; margin-top: 5px; }
    .dot-red    { background: var(--red); }
    .dot-orange { background: var(--orange); }
    .dot-yellow { background: var(--yellow); }
    .watch-text { font-size: 12px; color: var(--text-2); line-height: 1.5; }

    /* Deep Dive */
    .deep-dive-header { display: flex; align-items: center; gap: 12px; margin-bottom: 18px; padding-bottom: 14px; border-bottom: 1px solid var(--border-2); flex-wrap: wrap; }
    .deep-dive-pill { font-size: 11px; font-weight: 700; letter-spacing: 0.8px; text-transform: uppercase; padding: 4px 12px; border-radius: 20px; white-space: nowrap; }
    .dp-stratus  { background: var(--purple-dim); color: var(--purple-dark); border: 1px solid rgba(79,70,229,0.3); }
    .dp-approvals{ background: var(--teal-dim);   color: var(--teal);        border: 1px solid rgba(0,150,165,0.3); }
    .deep-dive-meta { font-size: 12px; color: var(--text-3); line-height: 1.5; }
    .deep-dive-meta strong { color: var(--text-1); }
    .deep-dive-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .deep-dive-col-title { font-size: 10px; font-weight: 700; letter-spacing: 0.6px; text-transform: uppercase; color: var(--text-3); margin-bottom: 10px; }
    .dd-item { display: flex; gap: 8px; padding: 8px 0; border-bottom: 1px solid var(--border-2); align-items: flex-start; }
    .dd-item:last-child { border-bottom: none; }
    .dd-count { min-width: 22px; height: 22px; background: var(--surface-2); border: 1px solid var(--border); border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; color: var(--text-2); flex-shrink: 0; }
    .dd-label  { font-size: 12px; color: var(--text-1); font-weight: 500; line-height: 1.4; }
    .dd-detail { font-size: 11px; color: var(--text-3); line-height: 1.5; margin-top: 1px; }
    .dd-quote  { font-size: 10.5px; color: var(--text-3); font-style: italic; background: var(--surface-2); border-left: 2px solid var(--border); padding: 4px 8px; margin-top: 4px; border-radius: 0 3px 3px 0; }
    .sentiment-pill { display: inline-block; font-size: 10px; font-weight: 700; padding: 3px 10px; border-radius: 20px; letter-spacing: 0.5px; }
    .s-positive { background: var(--green-dim);  color: var(--green);  border: 1px solid rgba(48,185,128,0.3); }
    .s-mixed    { background: var(--yellow-dim); color: var(--yellow); border: 1px solid rgba(194,122,0,0.3); }
    .s-negative { background: var(--red-dim);    color: var(--red);    border: 1px solid rgba(223,27,65,0.3); }
    .wow-badge  { display: inline-flex; align-items: center; gap: 6px; font-size: 11px; font-weight: 600; padding: 4px 12px; border-radius: 6px; }
    .wow-up   { background: var(--red-dim);    color: var(--red);    border: 1px solid rgba(223,27,65,0.25); }
    .wow-down { background: var(--green-dim);  color: var(--green);  border: 1px solid rgba(48,185,128,0.3); }
    .wow-flat { background: var(--yellow-dim); color: var(--yellow); border: 1px solid rgba(194,122,0,0.3); }
    .product-tag { display: inline-block; font-size: 10.5px; padding: 2px 9px; border-radius: 20px; font-weight: 600; margin: 2px; }
    .tag-missing { background: var(--red-dim);    color: var(--red);    border: 1px solid rgba(220,38,38,0.2); }
    .tag-broken  { background: var(--orange-dim); color: var(--orange); border: 1px solid rgba(234,93,42,0.2); }
    .tag-gap     { background: var(--yellow-dim); color: var(--yellow); border: 1px solid rgba(217,119,6,0.2); }
    .priority-list { list-style: none; }
    .priority-list li { display: flex; gap: 8px; padding: 7px 0; border-bottom: 1px solid var(--border-2); font-size: 12px; color: var(--text-2); line-height: 1.5; }
    .priority-list li:last-child { border-bottom: none; }
    .pn      { min-width: 18px; height: 18px; background: var(--purple-dim); border-radius: 3px; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; color: var(--purple); margin-top: 1px; flex-shrink: 0; }
    .pn-teal { min-width: 18px; height: 18px; background: var(--teal-dim);   border-radius: 3px; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; color: var(--teal);   margin-top: 1px; flex-shrink: 0; }

    /* Footer */
    .footer { padding: 14px 0 32px; font-size: 11px; color: var(--text-3); border-top: 1px solid var(--border); margin-top: 20px; }
    .footer-inner { max-width: 1360px; margin: 0 auto; padding: 0 28px; }

    canvas { max-height: 360px; }

    /* Loading / error */
    #loading { display: flex; align-items: center; justify-content: center; min-height: 60vh; flex-direction: column; gap: 12px; }
    .spinner { width: 24px; height: 24px; border: 2px solid var(--border); border-top-color: var(--purple); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #app { display: none; }

  /* Freshness banner */
  .freshness-bar { background:#FFFBF0; border-bottom:1px solid #F6E05E; padding:7px 28px; font-size:11px; color:#744210; display:flex; align-items:center; gap:8px; }
  .freshness-bar strong { font-weight:700; }
  </style>
</head>
<body>

<div id="loading"><div class="spinner"></div><p style="color:var(--text-3);font-size:13px">Loading dashboard…</p></div>
<div id="app"></div>

<script>
// ─── HELPERS ─────────────────────────────────────────────────────────────────
function h(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Parse **bold** markdown → HTML (safe: only trusted JSON content)
function bold(text) {
  return String(text).split(/\*\*([^*]+)\*\*/g)
    .map((p, i) => i % 2 === 0 ? h(p) : `<strong>${h(p)}</strong>`)
    .join('');
}

// WoW computed values
function wowPct(w1, w2) {
  if (w1 === 0) return w2 > 0 ? '+∞' : '0%';
  const p = Math.round(((w2 - w1) / w1) * 100);
  return (p >= 0 ? '+' : '') + p + '%';
}

function parseTsFromSlackLink(url) {
  if (!url) return null;
  const m = url.match(/\/p(\d{10})/);
  return m ? parseInt(m[1], 10) : null;
}
function daysAgoFromTs(unixSecs) {
  if (!unixSecs) return null;
  return Math.max(0, Math.floor((Date.now()/1000 - unixSecs) / 86400));
}
function staleColor(d) {
  if (d === null) return 'var(--text-3)';
  if (d >= 5) return 'var(--red)';
  if (d >= 3) return '#F5A623';
  if (d >= 1) return 'var(--text-2)';
  return 'var(--green)';
}
function staleLabel(d) {
  if (d === null) return '—';
  if (d === 0) return 'today';
  if (d === 1) return '1d ago';
  return d + 'd ago';
}
function wowArrow(w1, w2) {
  if (w1 === 0) return w2 > 0 ? '↑↑' : '→';
  const p = ((w2 - w1) / w1) * 100;
  if (p > 100) return '↑↑';
  if (p > 15)  return '↑';
  if (p < -15) return '↓';
  return '→';
}
function wowClass(w1, w2) {
  if (w1 === 0) return w2 > 0 ? 't-up' : 't-flat';
  const p = ((w2 - w1) / w1) * 100;
  if (p > 15)  return 't-up';
  if (p < -15) return 't-down';
  return 't-flat';
}
function kpiColor(w1, w2) {
  const p = w1 === 0 ? (w2 > 0 ? 999 : 0) : ((w2 - w1) / w1) * 100;
  if (p > 15)  return 'up';
  if (p < -15) return 'down';
  return 'flat';
}
function wowBadgeClass(w1, w2) {
  const p = w1 === 0 ? 999 : ((w2 - w1) / w1) * 100;
  if (p > 15)  return 'wow-up';
  if (p < -15) return 'wow-down';
  return 'wow-flat';
}

function sevClass(s)  { return { crit:'b-crit', high:'b-high', med:'b-med', low:'b-low' }[s] || 'b-low'; }
function sevLabel(s)  { return { crit:'Critical', high:'High', med:'Medium', low:'Low' }[s] || s; }
function dotClass(s)  { return `dot-${s}`; }

function slackLink(url) {
  if (!url) return '<span style="color:var(--text-3);font-size:11px">—</span>';
  const isMsg = /\/p\d{10,}/.test(url);
  const chName = url.includes('C05FDARJBA4') ? '#seller-systems'
               : url.includes('C0AEUHR9UC8') ? '#stratus'
               : '#channel';
  const label = isMsg ? '→ thread ↗' : `${chName} ↗`;
  return `<a class="sl" href="${h(url)}" target="_blank">${label}</a>`;
}


function renderQuickLookTable(d) {
  const allCats = [
    ...(d.categories||[]),
    ...(d.stratus_categories||[]),
  ].filter(c => c.status !== 'resolved');

  const rows = allCats.map(c => {
    const threads = c.threads || [];
    let latestTs = parseTsFromSlackLink(c.slack_link);
    threads.forEach(t => {
      const ts = parseTsFromSlackLink(t.slack_link);
      if (ts && (!latestTs || ts > latestTs)) latestTs = ts;
    });
    const daysStale = daysAgoFromTs(latestTs);
    return {...c, latestTs, daysStale};
  }).sort((a, b) => {
    const so = {crit:0, high:1, med:2, low:3};
    const sa = so[a.severity]??4, sb = so[b.severity]??4;
    if (sa !== sb) return sa - sb;
    return (b.daysStale??-1) - (a.daysStale??-1);
  });

  const sevDot = s => `<span class="dot dot-${s||'low'}" style="display:inline-block;width:9px;height:9px;border-radius:50%;"></span>`;
  const wkBadge = r => r > 1 ? `<span style="margin-left:6px;font-size:10px;background:#F0EEFF;color:#635BFF;border-radius:10px;padding:1px 6px;font-weight:700;">wk ${r}</span>` : '';
  const slinkIcon = url => url ? `<a class="sl" href="${h(url)}" target="_blank" title="Latest thread">↗</a>` : '';

  return `
<div class="section" id="quick-look"><div class="page">
  <div class="card" style="border-top:2px solid #635BFF;">
    <div class="card-title" style="display:flex;justify-content:space-between;align-items:center;">
      Quick Look — Open Issues by Staleness
      <span style="font-size:10px;font-weight:500;color:var(--text-3);">🚩 = stale &gt;5d · sorted by severity then age</span>
    </div>
    <div class="tbl-wrap"><table class="tbl">
      <thead><tr>
        <th style="width:35%;padding-left:10px">Issue</th>
        <th class="c" style="width:50px">Sev</th>
        <th class="c" style="width:80px">Status</th>
        <th class="c" style="width:40px">W2</th>
        <th class="c" style="width:90px">Last Activity</th>
        <th class="c" style="width:40px">Link</th>
      </tr></thead>
      <tbody>
        ${rows.map(c => {
          const isStale = (c.daysStale ?? 0) >= 3;
          const ds = c.daysStale;
          return `<tr style="${isStale ? 'background:rgba(223,27,65,0.025);' : ''}">
            <td style="padding-left:10px;font-weight:${isStale?600:400};">
              ${h(c.name)}${wkBadge(c.recurrence??0)}
            </td>
            <td class="c">${sevDot(c.severity)}</td>
            <td class="c" style="font-size:11px;color:var(--text-2);">${h(c.status||'open')}</td>
            <td class="c" style="font-weight:700;">${c.w2||0}</td>
            <td class="c" style="font-weight:${(ds??0)>=3?700:400};color:${staleColor(ds)};">

          </tr>`;
        }).join('')}
      </tbody>
    </table></div>
  </div>
</div></div>`;
}

function categoryRow(c) {
  const flags = (c.flags||[]).map(f => `<span style="font-size:10px;color:var(--red);font-weight:600;margin-left:4px;">${h(f)}</span>`).join('');
  const delta = wowPct(c.w1, c.w2);
  const arrow = wowArrow(c.w1, c.w2);
  const cls   = wowClass(c.w1, c.w2);
  const resolvedBadge = c.resolved
    ? `<span style="font-size:10px;color:#16a34a;background:rgba(34,197,94,0.1);border:1px solid rgba(34,197,94,0.3);padding:1px 7px;border-radius:10px;font-weight:600;margin-left:6px;">✓ Resolved</span>`
    : '';
  const threads = c.threads || [];
  const hasThreads = threads.length > 0;
  const expandIcon = hasThreads ? `<span style="font-size:10px;color:var(--text-3);margin-left:6px;opacity:0.6;">▶</span>` : '';
  const rowId = 'row-' + encodeURIComponent(c.name).replace(/%/g,'_');
  const detailId = 'detail-' + encodeURIComponent(c.name).replace(/%/g,'_');

  const threadCards = threads.map(t => {
    const resIcon = t.resolved
      ? `<span style="font-size:10px;color:#16a34a;background:rgba(34,197,94,0.1);border:1px solid rgba(34,197,94,0.3);padding:1px 6px;border-radius:8px;font-weight:600;white-space:nowrap;">✓ resolved</span>`
      : `<span style="font-size:10px;color:var(--orange);background:rgba(251,146,60,0.1);border:1px solid rgba(251,146,60,0.3);padding:1px 6px;border-radius:8px;font-weight:600;white-space:nowrap;">open</span>`;
    const slk = t.slack_link
      ? `<a href="${h(t.slack_link)}" target="_blank" style="font-size:10px;color:var(--purple);font-weight:500;text-decoration:none;white-space:nowrap;">→ thread ↗</a>`
      : '';
    const note = t.resolution_note
      ? `<div style="font-size:11px;color:#16a34a;margin-top:4px;font-style:italic;">${h(t.resolution_note)}</div>`
      : '';
    return `<div style="background:var(--bg-2,#f8f8f8);border:1px solid var(--border);border-radius:8px;padding:10px 12px;margin-bottom:8px;">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap;">
        <span style="font-size:11px;font-weight:700;color:var(--text-1);">${h(t.author||'')}</span>
        ${resIcon}
        ${slk}
      </div>
      <div style="font-size:12px;color:var(--text-2);font-style:italic;line-height:1.5;">"${h(t.quote||'')}"</div>
      ${note}
    </div>`;
  }).join('');

  const detailRow = hasThreads ? `<tr id="${detailId}" style="display:none;">
    <td colspan="7" style="padding:0;border-bottom:2px solid var(--border);">
      <div style="padding:12px 16px;background:linear-gradient(to bottom,rgba(99,102,241,0.04),transparent);">
        <div style="font-size:11px;font-weight:700;letter-spacing:0.7px;text-transform:uppercase;color:var(--text-3);margin-bottom:10px;">Threads this week</div>
        ${threadCards}
      </div>
    </td>
  </tr>` : '';

  const mainRow = `<tr id="${rowId}" ${hasThreads ? `onclick="toggleDetail('${detailId}','${rowId}')" style="cursor:pointer;"` : ''}>
    <td class="label" style="padding-left:10px">${h(c.name)}${flags}${resolvedBadge}${expandIcon}</td>
    <td class="c">${c.w1}</td>
    <td class="c">${c.w2}</td>
    <td class="c ${cls}">${arrow} ${delta}</td>
    <td><span class="badge ${sevClass(c.severity)}">${sevLabel(c.severity)}</span></td>
    <td style="font-size:11px;color:var(--text-3)">${h(c.note || c.status || '')}</td>
    <td>${slackLink(c.link)}</td>
  </tr>`;

  return mainRow + detailRow;
}

function toggleDetail(detailId, rowId) {
  const detail = document.getElementById(detailId);
  const row = document.getElementById(rowId);
  if (!detail) return;
  const isOpen = detail.style.display !== 'none';
  detail.style.display = isOpen ? 'none' : 'table-row';
  const icon = row ? row.querySelector('span[style*="▶"], span[style*="▼"]') : null;
  if (icon) icon.textContent = isOpen ? '▶' : '▼';
}

        <div style="margin-top:16px;">
          <div class="deep-dive-col-title">Adoption Friction</div>

        ${(s.missing_products||[]).length ? `

  return `
<div style="border-top:1px solid var(--border);margin:16px 28px 0;padding:16px 0 4px;">

function buildCharts(d) {
  const cats = [...(d.categories||[]), ...(d.stratus_categories||[])];
  const labels = cats.map(c => c.name.replace(' in DC','').replace(' / ','/ '));
  const w1data  = cats.map(c => c.w1);
  const w2data  = cats.map(c => c.w2);
  const m = d.meta || {};

  const tip = { backgroundColor:'#fff', borderColor:'#E3E8EE', borderWidth:1, titleColor:'#0A2540', bodyColor:'#425466', padding:10 };
  const f   = { family:"-apple-system,'Inter',sans-serif", size:11 };
  const tick = '#8898AA', grid = '#E3E8EE';

  new Chart(document.getElementById('wowChart'), {
    type: 'bar',
    data: {
      labels,
      datasets: [
        { label: `W2 (${(m.w2||{}).label||''})`, data: w2data, backgroundColor: 'rgba(99,91,255,0.3)', borderWidth:0, borderRadius:4 },
        { label: `W1 (${(m.w1||{}).label||''})`, data: w1data, backgroundColor: 'rgba(0,163,196,0.35)', borderWidth:0, borderRadius:4 }
      ]
    },
    options: {
      responsive:true, maintainAspectRatio:false,
      barPercentage:0.65, categoryPercentage:0.75,
      plugins: { legend:{ labels:{ color:'#0A2540', font:{...f,weight:'500'}, boxWidth:12, padding:16 } }, tooltip:tip },
      scales: {
        x: { ticks:{ color:tick, font:f }, grid:{ color:grid } },
        y: { ticks:{ color:tick, font:f }, grid:{ color:grid }, beginAtZero:true }
      }
    }
  });

  // Color by severity: crit=red, high=orange, med=yellow, low=green
  const sevColors = {
    crit:  'rgba(223,27,65,0.45)',
    high:  'rgba(255,123,0,0.4)',
    med:   'rgba(194,122,0,0.35)',
    low:   'rgba(48,185,128,0.35)'
  };
  const barColors = cats.map(c => sevColors[c.severity] || sevColors.low);

  new Chart(document.getElementById('distChart'), {
    type: 'bar',
    data: {
      labels,
      datasets: [{ label:'W2 Count', data:w2data, backgroundColor:barColors, borderWidth:0, borderRadius:4 }]
    },
    options: {
      indexAxis:'y', responsive:true, maintainAspectRatio:false,
      barPercentage:0.6, categoryPercentage:0.8,
      plugins: { legend:{ display:false }, tooltip:tip },
      scales: {
        x: { ticks:{ color:tick, font:f }, grid:{ color:grid }, beginAtZero:true },
        y: { ticks:{ color:tick, font:{ ...f, size:10 } }, grid:{ color:'transparent' } }
      }
    }
  });
}

oreign Exchange Fee - Default to 100%, instead of 0%, it seems the error is gone. However I don't manage to save to opportunity anymore, it's loading forever...","ts":"May 6 2:49 PM"},{"author":"esambi-c","type":"resolver","text":"looks like the convert to pc checkbox and the deal conversion status flag needed to be reset — we've done that now. Please can you try again you should be able to move forward.","ts":"May 6 4:36 PM"},{"author":"sophiec","type":"reporter","text":"its still loading. when i go back DC (EU only deal) I have to go again through Commitment and Go Live dates, then when i try to save to opp, it loads...","ts":"May 6 5:32 PM"},{"author":"esambi-c","type":"resolver","text":"If you refresh DC, you should see today as the last saved date","ts":"May 6 5:40 PM"},{"author":"sophiec","type":"reporter","text":"👍 all good now thank you!","ts":"May 7 1:57 AM"}]},{"author":"kailarson","resolved":true,"status_label":"Resolved with workaround — DC_SUPPORT-1423 (dori)","jira":"DC_SUPPORT-1423","jira_url":"https://jira.corp.stripe.com/browse/DC_SUPPORT-1423","slack_link":"https://stripe.slack.com/archives/C05FDARJBA4/p1746471208233679","resolution_note":"Workaround: tick Terminal or Sigma first to get Paid Support selected by default, then untick Terminal/Sigma — Paid Support stays selected. Underlying checkbox bug still exists. kailarson: 'Thanks @dori that worked!'","quote":"I am getting an error on this DC — can't save to opp because I don't have support services. The Paid Support checkbox will not remain selected long enough to hit save.","messages":[{"author":"kailarson","type":"reporter","text":"Hi, I am getting an error on this DC that I can't save it to my opp because I don't have support services. When I try to add Paid Support Services, it will not remain selected and save to the next step.","ts":"May 5 3:40 PM"},{"author":"Trailbot","type":"resolver","text":"For 'New to Stripe' deals, you must have a Support Services package. Add the $0 'Business Support Services' from the 'Paid Support Fees' section, click 'Save as Draft'. If selections do not remain saved, do a hard refresh.","ts":"May 5 3:40 PM"},{"author":"Askbot","type":"system","text":"Successfully created your Jira ticket at DC_SUPPORT-1423","ts":"May 5 3:40 PM"},{"author":"support","type":"resolver","text":"Hi kailarson, did you find the business support services?","ts":"May 5 3:44 PM"},{"author":"kailarson","type":"reporter","text":"These ones, right? [screenshot] The box won't stay selected long enough for me to hit save. Looks like a bug. It will not remain selected.","ts":"May 5 4:27 PM"},{"author":"dori","type":"resolver","text":"Sorry for jumping in here — just happened to see it. I usually just tick Terminal or Sigma to get Paid Support selected by default. Then you can untick Terminal/Sigma and it'll stay selected!","ts":"May 5 4:33 PM"},{"author":"kailarson","type":"reporter","text":"Thanks @dori that worked!","ts":"May 5 4:46 PM"}]}]},{"name":"ONR Calculation Errors","w1":10,"w2":8,"severity":"high","status":"open","summary":"Slight decrease WoW. salomon: significant FX discrepancies in DC renewal model. helenamcalinden: card showing below floor unexpectedly. belal: EUD direct volume data model question. FX 100% forced errors also inflating ONR confusion across multiple deals.","slack_link":"https://stripe.slack.com/archives/C05FDARJBA4/p1746210711104299","recurrence":8,"resolved":false,"threads":[{"author":"salomon","resolved":false,"status_label":"Unclear — deal saved but FX discrepancy root cause unexplained (DC_SUPPORT-1393)","jira":"DC_SUPPORT-1393","jira_url":"https://jira.corp.stripe.com/browse/DC_SUPPORT-1393","slack_link":"https://stripe.slack.com/archives/C05FDARJBA4/p1746210711104299","resolution_note":"Support noted deal was eventually saved but did not address the FX discrepancy (DC shows ~half of EUD FX revenue of ~7K). Root cause of data gap unknown. If still a blocker, salomon asked to re-open.","quote":"DC is showing only half the FX revenue vs EUD (~7K over 12 months), resulting in net BPS Retention of 80% without discounting anything.","messages":[{"author":"salomon","type":"reporter","text":"Hi team, I am modeling this renewal deal in DC but I am seeing significant discrepancies for FX. According to EUD we have generated around 7K from FX over the last 12 months. However, DC is showing only half of this, resulting in a net BPS Retention of 80% without discounting anything.","ts":"May 2 12:31 PM"},{"author":"Askbot","type":"system","text":"Successfully created your Jira ticket at DC_SUPPORT-1393","ts":"May 2 12:33 PM"},{"author":"salomon","type":"reporter","text":"hi team, any updates on this?","ts":"May 5 7:30 PM"},{"author":"support","type":"resolver","text":"Apologies I initially missed this issue. I see your deal was successfully saved. If you are still experiencing a blocker, please post a new issue to our support channel.","ts":"May 23 (later)"}]}]},{"name":"Product / Geo Gaps","w1":7,"w2":8,"severity":"high","status":"open","summary":"ameliarich blocked multiple days on NZ large platform deal — T+1+T+2 simultaneous not supported in DC (confirmed by Faster Payouts team). Must choose one or opt out of DC entirely. DC_SUPPORT-1405. Still awaiting resolution. Billing SaaS option not appearing in DC despite being a listed product. Sigma + DataPipeline still absent from Stratus.","slack_link":"https://stripe.slack.com/archives/C05FDARJBA4/p1746406973700279","recurrence":9,"resolved":false,"threads":[{"author":"ameliarich","resolved":false,"status_label":"Open — T+1+T+2 simultaneous unsupported in DC (product gap, not bug)","jira":"DC_SUPPORT-1405","jira_url":"https://jira.corp.stripe.com/browse/DC_SUPPORT-1405","slack_link":"https://stripe.slack.com/archives/C05FDARJBA4/p1746406973700279","resolution_note":"Faster Payouts team confirmed: T+1 and T+2 cannot both be contracted simultaneously — must choose one. DC correctly enforces this. Workaround: opt out of DC entirely. ameliarich asked GDM to handle manually.","quote":"I'm trying to add both T+1 and T+2 for new zealand but it will only let me add one or the other. I've been blocked on this deal for a number of days now.","messages":[{"author":"ameliarich","type":"reporter","text":"Hi Team - I'm trying to add both T+1 and T+2 for new zealand but it will only let me add one or the other. Is this intentional? How do we manage this when a user wants both?","ts":"May 5 11:02 AM"},{"author":"nprathapagiri-c","type":"resolver","text":"Hi ameliarich will get back to you shortly","ts":"May 5 11:06 AM"},{"author":"nprathapagiri-c","type":"resolver","text":"We can't contract for both, has to be one or the other — T+1 or T+2, not T+1 and T+2. [prior thread reference attached]","ts":"May 5 11:39 AM"},{"author":"ameliarich","type":"reporter","text":"@nprathapagiri-c - can you please confirm that the work around is to get GDM to add either T+1 or T+2 in?","ts":"May 5 11:44 AM"},{"author":"nprathapagiri-c","type":"resolver","text":"Faster Payouts team have mentioned that the T+1 and T+2 functionality is available but not supported in DC. So please try opting out DC and let us know how you go.","ts":"May 5 11:54 AM"},{"author":"ameliarich","type":"escalation","text":"@bakhos - are you able to help out here? this is a very large platform and I've been blocked on this deal for a number of days now","ts":"May 6 7:23 AM"},{"author":"ameliarich","type":"escalation","text":"Hey @dsergeyev - just bumping my comment before your day ends - I've been blocked on this deal for a number of days now","ts":"May 6 11:50 AM"}]}]},{"name":"Contract / DocuSign","w1":7,"w2":5,"severity":"med","status":"open","summary":"Volume down WoW. emilybonner: cannot select a document when generating FS (CLM permissions gap). Prior EMEA Signing Group Europe issue (jmcgrath) was resolved last run but watch for new CLM access gaps. annetunda still blocked on DocuSign send permissions.","slack_link":"https://stripe.slack.com/archives/C05FDARJBA4/p1746216994986009","recurrence":9,"resolved":false,"threads":[{"author":"emilybonner","resolved":true,"status_label":"Resolved — DC_SUPPORT-1398 (guidance)","jira":"DC_SUPPORT-1398","jira_url":"https://jira.corp.stripe.com/browse/DC_SUPPORT-1398","slack_link":"https://stripe.slack.com/archives/C05FDARJBA4/p1746216994986009","resolution_note":"No automated products on the deal. Use 'Additional Templates' button to download Business Support Services and Stripe Data Pipeline for Redshift templates manually. emilybonner: 'Got it, thank you!'","quote":"Could you let me know why I cannot select a document when trying to generate a FS?","messages":[{"author":"emilybonner","type":"reporter","text":"Hi team - Could you let me know why I cannot select a document when trying to generate a FS?","ts":"May 2 4:16 PM"},{"author":"Askbot","type":"system","text":"Successfully created your Jira ticket at DC_SUPPORT-1398","ts":"May 2 4:22 PM"},{"author":"support","type":"resolver","text":"I suspect its a permission setting, let me raise this up.","ts":"May 2 4:26 PM"},{"author":"support","type":"resolver","text":"This isn't a permissions issue. There aren't any products selected on the Deal that are automated in fee schedules. You will need to download the relevant template for: [Business Support Services, Stripe Data Pipeline for Redshift] using the 'Additional Templates' button. Click Cancel to be returned to your Opportunity.","ts":"May 2 4:29 PM"},{"author":"emilybonner","type":"reporter","text":"Got it, thank you!","ts":"May 2 4:40 PM"}]}]},{"name":"Renewals","w1":26,"w2":35,"severity":"high","status":"open","summary":"+34.6% WoW (26→35 SFDC cases) — largest relative spike this run. Six AE issues surfaced in W2: partial import blocking save on issuing renewal (sarahhunt), inflated ONR on early renewal (haileychisholm — actual AONR $7,138 vs inflated figure), DC not populating for early renewal (andrewmcfall, BlueGrace), T+2 Malaysia pricing missing in DC (laurenteo, Cinch.sg), pricing section not populated after retrieve-renewals (sonalinetke), contract generation stuck on SPA (ashleydombalis, Quince 2026). Pattern: retrieve-renewals flow is unreliable — partial imports leave deals unsaveable.","slack_link":"https://stripe.slack.com/archives/C05FDARJBA4","recurrence":1,"resolved":false,"threads":[{"author":"sarahhunt","resolved":false,"status_label":"Open — issuing renewal partial import","jira":null,"jira_url":null,"slack_link":"https://stripe.slack.com/archives/C05FDARJBA4/p1778084945167349","resolution_note":null,"quote":"I have a deal composer here for an issuing renewal. When i try to save, it prompts me to retrieve renewals, and when i do so it says a partial import is complete, but it won't allow me to save the deal because the trailing NPV etc has not pulled in.","messages":[{"author":"sarahhunt","type":"reporter","text":"I have a deal composer here for an issuing renewal. When i try to save, it prompts me to retrieve renewals, and when i do so it says a partial import is complete, but it won't allow me to save the deal because the trailing NPV etc has not pulled in.","ts":"May 4 ~2:00 PM"}]},{"author":"haileychisholm","resolved":false,"status_label":"Open — inflated ONR on early renewal","jira":null,"jira_url":null,"slack_link":"https://stripe.slack.com/archives/C05FDARJBA4/p1778016550552379","resolution_note":null,"quote":"I'm working on an early renewal and my negotiated ONR is super inflated. This repricing is populated based on expected growth, so the only AONR I'm actually getting is $7,138.","messages":[{"author":"haileychisholm","type":"reporter","text":"I'm working on an early renewal and my negotiated ONR is super inflated. This repricing is populated based on expected growth, so the only AONR I'm actually getting is $7,138. Can someone help me please update this field so I can close this deal?","ts":"May 3 ~5:00 PM"}]},{"author":"laurenteo","resolved":false,"status_label":"Open — T+2 Malaysia not priceable in DC","jira":null,"jira_url":null,"slack_link":"https://stripe.slack.com/archives/C05FDARJBA4/p1777941419141889","resolution_note":null,"quote":"I'm working on a renewal with Cinch.sg and they've requested pricing for faster payouts (T+2) in Malaysia, but I can't seem to price them in Deal Composer.","messages":[{"author":"laurenteo","type":"reporter","text":"I'm working on a renewal with Cinch.sg and they've requested pricing for faster payouts (T+2) in Malaysia, but I can't seem to price them in Deal Composer. I've checked with #faster-payouts-gtm and confirmed that T+2 is available for MY.","ts":"May 3 ~8:00 AM"}]},{"author":"sonalinetke","resolved":false,"status_label":"Open — retrieve renewals not populating pricing","jira":null,"jira_url":null,"slack_link":"https://stripe.slack.com/archives/C05FDARJBA4/p1777910359338089","resolution_note":null,"quote":"I have retrieved renewals but it still has not populated anything in product selection or in the pricing section.","messages":[{"author":"sonalinetke","type":"reporter","text":"I have retrieved renewals but it still has not populated anything in product selection or in the pricing section.","ts":"May 3 ~5:30 AM"}]}]},{"name":"Approvals / Workflow","w1":6,"w2":3,"severity":"med","status":"monitoring","summary":"Rich Counts stale approver routing confirmed resolved — zero new reports this week (was same-day action for 5+ consecutive weeks). schenay: unable to submit for approval despite completing all required sections (isolated). Volume down 50% WoW — strongest positive trend this run.","slack_link":"https://stripe.slack.com/archives/C05FDARJBA4/p1746431794517369","recurrence":9,"resolved":false,"threads":[{"author":"schenay","resolved":true,"status_label":"Resolved — DC_SUPPORT-1408 (guidance: manual NPV/ONR fields)","jira":"DC_SUPPORT-1408","jira_url":"https://jira.corp.stripe.com/browse/DC_SUPPORT-1408","slack_link":"https://stripe.slack.com/archives/C05FDARJBA4/p1746431794517369","resolution_note":"NPV Retention (%) and ONR Retention (%) are not auto-populated by Deal Composer — must be manually entered. Support pointed this out and schenay should have been able to submit for approval.","quote":"I am unable to submit for approval even though I have completed all the required sections.","messages":[{"author":"schenay","type":"reporter","text":"Hi team - I am unable to submit for approval even though I have completed all the required sections. Can you please review? Thanks in advance!","ts":"May 6 7:36 AM"},{"author":"Askbot","type":"system","text":"Successfully created your Jira ticket at DC_SUPPORT-1408","ts":"May 6 2:33 PM"},{"author":"support","type":"resolver","text":"Taking a look","ts":"May 6 4:41 PM"},{"author":"support","type":"resolver","text":"There are two fields that need to be manually entered with values: NPV Retention (%) and ONR Retention (%). Both fields do not get auto-populated by Deal Composer.","ts":"May 6 4:45 PM"},{"author":"support","type":"resolver","text":"Give it a try and you should be able to submit for approvals.","ts":"May 6 4:45 PM"}]}]},{"name":"Access / Provisioning","w1":9,"w2":6,"severity":"med","status":"open","summary":"Volume down WoW. Ongoing: Gong login fails post-provisioning (leiwang, raphaela). DocuSign CLM access gaps (annetunda, elisehw). LinkedIn Sales Nav not provisioned. Standard long-tail new hire access requests continue.","slack_link":"https://stripe.slack.com/archives/C05FDARJBA4","recurrence":9,"resolved":false,"threads":[]},{"name":"Gong / Tooling","w1":7,"w2":6,"severity":"med","status":"open","summary":"patrickg (May 6): Gong Manager Forecast Category edit broken as of this morning — fresh report, scope unknown, check if systemic. Ongoing: Gong not auto-recording for new hires (claudiadavino, alexanderg). GTMS-42435 new opp layout causing downstream effects (laivers). Recurring new-hire Gong onboarding friction continues.","slack_link":"https://stripe.slack.com/archives/C05FDARJBA4","recurrence":9,"resolved":false,"threads":[]},{"name":"Stratus Bugs","w1":9,"w2":10,"severity":"high","status":"open","summary":"paigey (May 2) resolved via RUN_STRATUS-71 — FX usage % must sum to 100%, Trailbot answered correctly, paigey confirmed resolved same session. Active: taylormcgavisk BPS margin not syncing Stratus→SFDC (2nd week, blocking close-as-won); lorishyu Klarna/Terminal line items missing; dalil AI GR not updating.","slack_link":"https://stripe.slack.com/archives/C0AEUHR9UC8","recurrence":9,"resolved":false,"threads":[{"author":"paigey","resolved":true,"status_label":"Resolved — RUN_STRATUS-71 (viveky + williams)","jira":"RUN_STRATUS-71","jira_url":"https://jira.corp.stripe.com/browse/RUN_STRATUS-71","slack_link":"https://stripe.slack.com/archives/C0AEUHR9UC8","resolution_note":"FX line-item Usage % must add up to 100% — not an AI data error. Trailbot answered correctly; viveky confirmed; paigey resolved same session.","quote":"I have no idea what this error means and how to fix it. When I asked the AI tool to fix it it ended up making it so disputes were showing as $1M in ONR or something crazy","messages":[{"author":"paigey","type":"reporter","text":"I have no idea what this error means and how to fix it. When I asked the AI tool to fix it it ended up making it so disputes were showing as $1M in ONR or something crazy","ts":"May 2 3:09 PM"},{"author":"Trailbot","type":"resolver","text":"That error means your FX line-item Usage % values must add up to 100% for that territory on an IC+ deal. In Stratus, this is a distribution check, not a check that the customer actually has 100% FX volume.","ts":"May 2 3:11 PM"},{"author":"viveky","type":"resolver","text":"Hey Paige, we will make the AI bot better. The bot above is correct. you need to put 100% on the line item.","ts":"May 2 3:12 PM"},{"author":"williams","type":"resolver","text":"If you want to set it up to 0, you need to put FX at 0 in the assumption page","ts":"May 2 3:12 PM"},{"author":"paigey","type":"reporter","text":"got it, thanks!","ts":"May 2 3:14 PM"}]},{"author":"taylormcgavisk","resolved":false,"status_label":"Open — week 2, blocking close-as-won","jira":null,"jira_url":null,"slack_link":"https://stripe.slack.com/archives/C0AEUHR9UC8/p1777647051446499","resolution_note":null,"quote":"I used Stratus to complete the pricing for my user but the BPS Margin has not passed over to the Salesforce Opp and I cannot close the opp as won until this is done.","messages":[{"author":"taylormcgavisk","type":"reporter","text":"I used Stratus to complete the pricing for my user but the BPS Margin has not passed over to the Salesforce Opp and I cannot close the opp as won until this is done.","ts":"May 1 4:30 PM"}]}]},{"name":"Stratus Adoption Friction","w1":5,"w2":5,"severity":"med","status":"open","summary":"Flat WoW. Sigma + DataPipeline still not in Stratus (katiedeaney ongoing), forcing DC fallback for affected deals. BETA products require DC proxy workaround. jesscusack: first-use action error on initial Stratus access — onboarding risk as organic demand grows. IC+ vs blended rate handling gap (darbysween).","slack_link":"https://stripe.slack.com/archives/C0AEUHR9UC8","recurrence":9,"resolved":false,"threads":[{"author":"jesscusack","resolved":true,"status_label":"Resolved — RUN_STRATUS-60","jira":"RUN_STRATUS-60","jira_url":"https://jira.corp.stripe.com/browse/RUN_STRATUS-60","slack_link":"https://stripe.slack.com/archives/C0AEUHR9UC8/p1777452967850259","resolution_note":"sahiln resolved — sticker prices not available for product. jesscusack was able to complete deal.","quote":"First-use action error when trying to access Stratus for the first time","messages":[{"author":"jesscusack","type":"reporter","text":"First-use action error when trying to access Stratus for the first time","ts":"Week of Apr 29"}]}]},{"name":"Pricing Questions","w1":5,"w2":5,"severity":"low","status":"open","summary":"Steady. rafamartin: DC with IC+ and Blended simultaneously — workflow guidance needed. jackdickens: pricing for
