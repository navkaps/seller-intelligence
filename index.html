<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Seller Systems Support Intelligence</title>
  <script src="./chart.min.js"></script>
  <style>
    :root {
      --bg:           #F6F9FC;
      --surface:      #FFFFFF;
      --surface-2:    #F6F9FC;
      --border:       #E3E8EE;
      --border-2:     #F0F4F8;
      --purple:       #635BFF;
      --purple-dim:   rgba(99,91,255,0.08);
      --purple-dark:  #4F46E5;
      --green:        #30B980;
      --green-dim:    rgba(48,185,128,0.08);
      --yellow:       #C27A00;
      --yellow-dim:   rgba(194,122,0,0.08);
      --red:          #DF1B41;
      --red-dim:      rgba(223,27,65,0.08);
      --orange:       #FF7B00;
      --orange-dim:   rgba(255,123,0,0.08);
      --teal:         #0096A5;
      --teal-dim:     rgba(0,150,165,0.08);
      --text-1:       #0A2540;
      --text-2:       #425466;
      --text-3:       #8898AA;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { overflow-x: auto; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", sans-serif;
      background: var(--bg); color: var(--text-2);
      min-height: 100vh; font-size: 13px; line-height: 1.5;
      min-width: 900px;
    }
    a { color: var(--purple); text-decoration: none; }
    a:hover { text-decoration: underline; }
    .page { max-width: 1360px; margin: 0 auto; padding: 0 28px; }

    /* Header */
    .header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 14px 0; }
    .header-inner { max-width: 1360px; margin: 0 auto; padding: 0 28px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
    .header-left { display: flex; align-items: center; gap: 14px; }
    .stripe-logo { width: 28px; height: 28px; background: var(--purple-dark); border-radius: 5px; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 800; color: white; }
    .header-title h1 { font-size: 15px; font-weight: 600; color: var(--text-1); }
    .header-title p  { font-size: 11px; color: var(--text-3); margin-top: 1px; }
    .header-right { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .run-badge { background: var(--purple-dim); border: 1px solid rgba(99,91,255,0.3); padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 600; color: var(--purple); }
    .ch-link { font-size: 11px; background: var(--surface-2); border: 1px solid var(--border); padding: 4px 10px; border-radius: 4px; }
    .ch-link a { color: var(--text-2); }

    /* Nav */
    .nav-bar { background: var(--surface); border-bottom: 1px solid var(--border); }
    .nav-inner { max-width: 1360px; margin: 0 auto; padding: 0 28px; display: flex; overflow-x: auto; }
    .nav-tab { font-size: 11px; font-weight: 600; color: var(--text-3); padding: 10px 14px; border-bottom: 2px solid transparent; white-space: nowrap; text-decoration: none; }
    .nav-tab:hover { color: var(--text-1); text-decoration: none; }
    .nav-tab.active { color: var(--purple); border-bottom-color: var(--purple); }

    .section { padding: 16px 0 0; }
    .section.last { padding-bottom: 32px; }

    /* BLUF */
    .bluf { background: var(--surface); border: 1px solid var(--border); border-left: 3px solid var(--purple); border-radius: 0 6px 6px 0; padding: 16px 20px; }
    .bluf-label { font-size: 10px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase; color: var(--purple); margin-bottom: 6px; }
    .bluf p { font-size: 12.5px; line-height: 1.75; color: var(--text-2); }
    .bluf strong { color: var(--text-1); }

    /* KPIs */
    .kpi-row { display: grid; grid-template-columns: repeat(6, minmax(0, 1fr)); gap: 1px; background: var(--border); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
    .kpi { background: var(--surface); padding: 12px 14px; min-width: 0; overflow: hidden; }
    .kpi-label { font-size: 9.5px; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; color: var(--text-3); margin-bottom: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .kpi-value { font-size: 22px; font-weight: 700; color: var(--text-1); line-height: 1; }
    .kpi-sub { font-size: 10.5px; margin-top: 4px; }
    .up { color: var(--red); } .down { color: var(--green); } .warn { color: var(--yellow); }

    /* Pulse */
    .pulse-grid { display: grid; grid-template-columns: repeat(5, minmax(0, 1fr)); gap: 10px; }
    .pulse-card { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 14px 16px; }
    .pulse-card-label { font-size: 10px; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; color: var(--text-3); margin-bottom: 6px; }
    .pulse-card-issue { font-size: 12px; color: var(--text-1); font-weight: 600; line-height: 1.4; margin-bottom: 6px; }
    .pulse-card-detail { font-size: 11px; color: var(--text-2); line-height: 1.5; }
    .pulse-card-link { display: inline-block; margin-top: 8px; font-size: 10px; color: var(--purple); background: var(--purple-dim); border: 1px solid rgba(99,91,255,0.25); padding: 2px 8px; border-radius: 3px; text-decoration: none; font-weight: 500; }
    .pulse-r { border-top: 2px solid var(--red); }
    .pulse-o { border-top: 2px solid var(--orange); }
    .pulse-y { border-top: 2px solid var(--yellow); }
    .pulse-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
    .pulse-pill { font-size: 10px; font-weight: 700; letter-spacing: 0.8px; text-transform: uppercase; color: var(--red); background: var(--red-dim); border: 1px solid rgba(223,27,65,0.25); padding: 3px 10px; border-radius: 20px; }
    .pulse-meta { font-size: 11px; color: var(--text-3); }
    .pulse-meta strong { color: var(--text-1); }

    /* Card */
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 20px 22px; }
    .card-title { font-size: 10px; font-weight: 700; letter-spacing: 0.8px; text-transform: uppercase; color: var(--text-3); margin-bottom: 16px; }

    /* Issue table */
    .tbl-wrap { overflow-x: auto; }
    .tbl { width: 100%; border-collapse: collapse; min-width: 760px; }
    .tbl th { font-size: 10px; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; color: rgba(255,255,255,0.85); text-align: left; padding: 8px 10px 8px 0; background: var(--purple-dark); }
    .tbl th:first-child { padding-left: 10px; }
    .tbl th.c { text-align: center; }
    .tbl td { padding: 9px 10px 9px 0; font-size: 12px; color: var(--text-2); border-bottom: 1px solid var(--border-2); vertical-align: middle; }
    .tbl tr:last-child td { border-bottom: none; }
    .tbl td.label { color: var(--text-1); font-weight: 500; }
    .tbl td.c { text-align: center; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 10px; font-weight: 600; white-space: nowrap; }
    .b-crit { background: var(--red-dim); color: var(--red); border: 1px solid rgba(223,27,65,0.25); }
    .b-high { background: var(--orange-dim); color: var(--orange); border: 1px solid rgba(196,77,0,0.25); }
    .b-med  { background: var(--yellow-dim); color: var(--yellow); border: 1px solid rgba(194,122,0,0.25); }
    .b-low  { background: var(--green-dim); color: var(--green); border: 1px solid rgba(14,138,95,0.25); }
    .t-up   { color: var(--red); font-weight: 700; }
    .t-flat { color: var(--text-3); }
    .t-down { color: var(--green); font-weight: 700; }
    .sl { display: inline-flex; align-items: center; gap: 3px; font-size: 10px; color: var(--purple); background: var(--purple-dim); border: 1px solid rgba(99,91,255,0.25); padding: 2px 7px; border-radius: 3px; text-decoration: none; font-weight: 500; white-space: nowrap; }

    /* Two-col */
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

    /* Actions */
    .action { display: flex; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border-2); align-items: flex-start; }
    .action:last-child { border-bottom: none; }
    .action-n { width: 20px; height: 20px; min-width: 20px; background: var(--purple-dim); border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; color: var(--purple); }
    .action-body { font-size: 12px; color: var(--text-2); line-height: 1.5; }
    .action-body strong { color: var(--text-1); }
    .action-owner { font-size: 10px; color: var(--text-3); margin-top: 2px; }

    /* Watchlist */
    .watch { display: flex; gap: 10px; padding: 9px 0; border-bottom: 1px solid var(--border-2); align-items: flex-start; }
    .watch:last-child { border-bottom: none; }
    .dot { width: 6px; height: 6px; min-width: 6px; border-radius: 50%; margin-top: 5px; }
    .dot-r { background: var(--red); } .dot-o { background: var(--orange); } .dot-y { background: var(--yellow); }
    .watch-text { font-size: 12px; color: var(--text-2); line-height: 1.5; }

    /* Deep Dive */
    .deep-dive-header { display: flex; align-items: center; gap: 12px; margin-bottom: 18px; padding-bottom: 14px; border-bottom: 1px solid var(--border-2); flex-wrap: wrap; }
    .deep-dive-pill { font-size: 11px; font-weight: 700; letter-spacing: 0.8px; text-transform: uppercase; padding: 4px 12px; border-radius: 20px; white-space: nowrap; }
    .dp-stratus { background: var(--purple-dim); color: var(--purple-dark); border: 1px solid rgba(79,70,229,0.3); }
    .dp-approvals { background: var(--teal-dim); color: var(--teal); border: 1px solid rgba(0,150,165,0.3); }
    .deep-dive-meta { font-size: 12px; color: var(--text-3); line-height: 1.5; }
    .deep-dive-meta strong { color: var(--text-1); }
    .deep-dive-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .deep-dive-col-title { font-size: 10px; font-weight: 700; letter-spacing: 0.6px; text-transform: uppercase; color: var(--text-3); margin-bottom: 10px; }
    .dd-item { display: flex; gap: 8px; padding: 8px 0; border-bottom: 1px solid var(--border-2); align-items: flex-start; }
    .dd-item:last-child { border-bottom: none; }
    .dd-count { min-width: 22px; height: 22px; background: var(--surface-2); border: 1px solid var(--border); border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; color: var(--text-2); }
    .dd-label { font-size: 12px; color: var(--text-1); font-weight: 500; line-height: 1.4; }
    .dd-detail { font-size: 11px; color: var(--text-3); line-height: 1.5; margin-top: 1px; }
    .dd-quote { font-size: 10.5px; color: var(--text-3); font-style: italic; background: var(--surface-2); border-left: 2px solid var(--border); padding: 4px 8px; margin-top: 4px; border-radius: 0 3px 3px 0; }
    .sentiment-pill { display: inline-block; font-size: 10px; font-weight: 700; padding: 3px 10px; border-radius: 20px; letter-spacing: 0.5px; }
    .s-mixed { background: var(--yellow-dim); color: var(--yellow); border: 1px solid rgba(194,122,0,0.3); }
    .s-positive { background: var(--green-dim); color: var(--green); border: 1px solid rgba(48,185,128,0.3); }
    .s-negative { background: var(--red-dim); color: var(--red); border: 1px solid rgba(223,27,65,0.3); }
    .wow-badge { display: inline-flex; align-items: center; gap: 6px; font-size: 11px; font-weight: 600; padding: 4px 12px; border-radius: 6px; margin-bottom: 14px; }
    .wow-down { background: var(--green-dim); color: var(--green); border: 1px solid rgba(48,185,128,0.3); }
    .wow-flat  { background: var(--yellow-dim); color: var(--yellow); border: 1px solid rgba(194,122,0,0.3); }
    .wow-up   { background: var(--red-dim); color: var(--red); border: 1px solid rgba(223,27,65,0.25); }
    .product-tag { display: inline-block; font-size: 10.5px; padding: 2px 9px; border-radius: 20px; font-weight: 600; margin: 2px; }
    .tag-r { background: var(--red-dim); color: var(--red); border: 1px solid rgba(220,38,38,0.2); }
    .tag-o { background: var(--orange-dim); color: var(--orange); border: 1px solid rgba(234,93,42,0.2); }
    .tag-y { background: var(--yellow-dim); color: var(--yellow); border: 1px solid rgba(217,119,6,0.2); }
    .priority-list { list-style: none; }
    .priority-list li { display: flex; gap: 8px; padding: 7px 0; border-bottom: 1px solid var(--border-2); font-size: 12px; color: var(--text-2); line-height: 1.5; }
    .priority-list li:last-child { border-bottom: none; }
    .pn { min-width: 18px; height: 18px; background: var(--purple-dim); border-radius: 3px; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; color: var(--purple); margin-top: 1px; }
    .pn-teal { min-width: 18px; height: 18px; background: var(--teal-dim); border-radius: 3px; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; color: var(--teal); margin-top: 1px; }

    /* Footer */
    .footer { padding: 14px 0 32px; font-size: 11px; color: var(--text-3); border-top: 1px solid var(--border); margin-top: 20px; }
    .footer-inner { max-width: 1360px; margin: 0 auto; padding: 0 28px; }

    canvas { max-height: 360px; }

    /* Loading state */
    #loading { display: flex; align-items: center; justify-content: center; min-height: 60vh; flex-direction: column; gap: 12px; }
    #loading p { color: var(--text-3); font-size: 13px; }
    .spinner { width: 24px; height: 24px; border: 2px solid var(--border); border-top-color: var(--purple); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #app { display: none; }
  </style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <p>Loading dashboard data…</p>
</div>

<div id="app"></div>

<script>
async function loadDashboard() {
  let d;
  try {
    const res = await fetch('./data.json?_=' + Date.now());
    d = await res.json();
  } catch(e) {
    document.getElementById('loading').innerHTML = '<p style="color:var(--red)">Failed to load data.json — ' + e.message + '</p>';
    return;
  }

  document.title = 'Seller Systems Support Intelligence — ' + d.run_date;
  document.getElementById('loading').style.display = 'none';
  const app = document.getElementById('app');
  app.style.display = 'block';
  app.innerHTML = buildHTML(d);
  buildCharts(d);
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function slackLink(channelId, label) {
  return `<a class="sl" href="https://stripe.slack.com/archives/${esc(channelId)}" target="_blank"># ${esc(label)}</a>`;
}

function severityBadge(s) {
  const map = { Critical:'b-crit', High:'b-high', Medium:'b-med', Low:'b-low' };
  return `<span class="badge ${map[s]||'b-low'}">${esc(s)}</span>`;
}

function deltaClass(dir) {
  if (dir === 'up') return 't-up';
  if (dir === 'down') return 't-down';
  return 't-flat';
}

function deltaArrow(dir, delta) {
  if (dir === 'up') return '↑ ' + delta;
  if (dir === 'down') return '↓ ' + delta;
  return '→ ' + delta;
}

function kpiSubClass(dir) {
  if (dir === 'up') return 'up';
  if (dir === 'down') return 'down';
  return 'warn';
}

function pulseCardClass(sev) {
  if (sev === 'critical') return 'pulse-r';
  if (sev === 'high') return 'pulse-o';
  return 'pulse-y';
}

function wowBadgeClass(dir) {
  if (dir === 'up') return 'wow-up';
  if (dir === 'down') return 'wow-down';
  return 'wow-flat';
}

function buildHTML(d) {
  const noteLabel = d.note ? ` · ${esc(d.note)}` : '';
  return `
<!-- HEADER -->
<div class="header">
  <div class="header-inner">
    <div class="header-left">
      <div class="stripe-logo">S</div>
      <div class="header-title">
        <h1>Seller Systems Support Intelligence</h1>
        <p>${esc(d.period)} · W1 (${esc(d.w1_label)}) vs W2 (${esc(d.w2_label)}) · Run: ${esc(d.run_date)}${noteLabel}</p>
      </div>
    </div>
    <div class="header-right">
      <div class="ch-link"><a href="https://stripe.slack.com/archives/C05FDARJBA4" target="_blank">#seller-systems-support ↗</a></div>
      <div class="ch-link"><a href="https://stripe.slack.com/archives/C09E79ZK3PS" target="_blank">#gtm-seller-systems-cpr ↗</a></div>
      <div class="ch-link"><a href="https://stripe.slack.com/archives/C0AEUHR9UC8" target="_blank">#stratus-support ↗</a></div>
      <div class="run-badge">${esc(d.run_date)}${d.note ? ' · ' + esc(d.note) : ''}</div>
    </div>
  </div>
</div>

<!-- NAV -->
<div class="nav-bar">
  <div class="nav-inner">
    <a class="nav-tab active" href="#overview">Overview</a>
    <a class="nav-tab" href="#issues">Issue Breakdown</a>
    <a class="nav-tab" href="#stratus">Stratus Deep Dive</a>
    <a class="nav-tab" href="#approvals">Approvals Deep Dive</a>
    <a class="nav-tab" href="#actions">Actions &amp; Watchlist</a>
  </div>
</div>

<!-- BLUF -->
<div class="section" id="overview">
  <div class="page">
    <div class="bluf">
      <div class="bluf-label">BLUF — ${esc(d.run_date)}${d.note ? ' · ' + esc(d.note) : ''}</div>
      <p>${esc(d.bluf)}</p>
    </div>
  </div>
</div>

<!-- KPIs -->
<div class="section">
  <div class="page">
    <div class="kpi-row">
      <div class="kpi">
        <div class="kpi-label">W2 Total (${esc(d.w2_label)})</div>
        <div class="kpi-value">${esc(String(d.kpis.w2_total))}</div>
        <div class="kpi-sub ${kpiSubClass(d.kpis.wow_direction)}">${esc(d.kpis.wow_pct)} vs W1 (${esc(String(d.kpis.w1_total))})</div>
      </div>
      <div class="kpi">
        <div class="kpi-label">Biggest Spike</div>
        <div class="kpi-value">${esc(d.kpis.biggest_spike_pct)}</div>
        <div class="kpi-sub up">↑ ${esc(d.kpis.biggest_spike_label)}</div>
      </div>
      <div class="kpi">
        <div class="kpi-label">Approval Blocks</div>
        <div class="kpi-value">${esc(String(d.kpis.approval_blocks))}</div>
        <div class="kpi-sub ${kpiSubClass(d.kpis.approval_blocks_direction)}">${esc(d.kpis.approval_blocks_wow)}</div>
      </div>
      <div class="kpi">
        <div class="kpi-label">Contract / Sig Issues</div>
        <div class="kpi-value">${esc(String(d.kpis.contract_sig))}</div>
        <div class="kpi-sub ${kpiSubClass(d.kpis.contract_sig_direction)}">${esc(d.kpis.contract_sig_wow)}</div>
      </div>
      <div class="kpi">
        <div class="kpi-label">Stratus W2 Issues</div>
        <div class="kpi-value">${esc(String(d.kpis.stratus_w2))}</div>
        <div class="kpi-sub ${kpiSubClass(d.kpis.stratus_direction)}">${esc(d.kpis.stratus_wow)}</div>
      </div>
      <div class="kpi">
        <div class="kpi-label">CPR — ${esc(d.kpis.cpr_label)}</div>
        <div class="kpi-value">${esc(d.kpis.cpr_metric)}</div>
        <div class="kpi-sub ${kpiSubClass(d.kpis.cpr_direction)}">${esc(d.kpis.cpr_wow)}</div>
      </div>
    </div>
  </div>
</div>

<!-- PULSE -->
<div class="section">
  <div class="page">
    <div class="pulse-header">
      <div class="pulse-pill">Top Issues This Week</div>
      <div class="pulse-meta"><strong>${esc(String(d.kpis.w2_total))} issues W2</strong> · ${esc(d.kpis.wow_pct)} WoW${d.note ? ' · ' + esc(d.note) : ''}</div>
    </div>
    <div class="pulse-grid">
      ${d.pulse.map(p => `
      <div class="pulse-card ${pulseCardClass(p.severity)}">
        <div class="pulse-card-label">${esc(p.label)}</div>
        <div class="pulse-card-issue">${esc(p.title)}</div>
        <div class="pulse-card-detail">${esc(p.detail)}</div>
        <a href="https://stripe.slack.com/archives/${esc(p.channel_id)}" target="_blank" class="pulse-card-link"># ${esc(p.channel_name)}</a>
      </div>`).join('')}
    </div>
  </div>
</div>

<!-- CHARTS -->
<div class="section">
  <div class="page">
    <div style="display:grid; grid-template-columns: 3fr 2fr; gap:16px; min-width:0;">
      <div class="card" style="min-width:0;">
        <div class="card-title">Volume by Category — W1 (${esc(d.w1_label)}) vs W2 (${esc(d.w2_label)})</div>
        <div style="position:relative; height:300px;"><canvas id="wowChart"></canvas></div>
      </div>
      <div class="card" style="min-width:0; border-top: 2px solid var(--red);">
        <div class="card-title">W2 Distribution — Top Categories</div>
        <div style="display:flex; align-items:baseline; gap:8px; margin-bottom:12px;">
          <span style="font-size:22px; font-weight:700; color:var(--text-1);">${esc(String(d.kpis.w2_total))}</span>
          <span style="font-size:11px; color:var(--red); font-weight:600;">${esc(d.kpis.wow_pct)} WoW</span>
        </div>
        <div style="position:relative; height:248px;"><canvas id="pulseChart"></canvas></div>
      </div>
    </div>
  </div>
</div>

<!-- ISSUE TABLE -->
<div class="section" id="issues">
  <div class="page">
    <div class="card">
      <div class="card-title">Issue Breakdown — W1 (${esc(d.w1_label)}) · W2 (${esc(d.w2_label)}) · WoW Δ · Severity</div>
      <div class="tbl-wrap"><table class="tbl">
        <thead><tr>
          <th style="width:23%">Category</th>
          <th class="c">W1</th><th class="c">W2</th><th class="c">WoW Δ</th>
          <th>Severity</th><th>Status</th><th>Slack</th>
        </tr></thead>
        <tbody>
          ${buildCategoryRows(d)}
        </tbody>
      </table></div>
    </div>
  </div>
</div>

<!-- STRATUS DEEP DIVE -->
${buildStratusSection(d)}

<!-- APPROVALS DEEP DIVE -->
${buildApprovalsSection(d)}

<!-- ACTIONS + WATCHLIST -->
<div class="section last" id="actions">
  <div class="page">
    <div class="two-col">
      <div class="card">
        <div class="card-title">Immediate Actions${d.note ? ' — ' + esc(d.note) : ''}</div>
        ${d.actions.map(a => `
        <div class="action">
          <div class="action-n">${esc(String(a.n))}</div>
          <div>
            <div class="action-body"><strong>${esc(a.title)}</strong> — ${esc(a.detail)}</div>
            <div class="action-owner">${esc(a.owner)}</div>
          </div>
        </div>`).join('')}
      </div>
      <div class="card">
        <div class="card-title">Watchlist — Next Run</div>
        ${d.watchlist.map(w => `
        <div class="watch">
          <div class="dot dot-${w.severity[0]}"></div>
          <div class="watch-text">${esc(w.text)}</div>
        </div>`).join('')}
      </div>
    </div>
    <div style="margin-top:12px; font-size:11px; color:var(--text-3);">
      Questions? <a href="https://stripe.slack.com/team/navin" target="_blank" style="color:var(--text-3);">@navin</a>
    </div>
  </div>
</div>

<!-- FOOTER -->
<div class="footer">
  <div class="footer-inner">
    ${esc(d.period)} ·
    <a href="https://stripe.slack.com/archives/C05FDARJBA4" target="_blank">#seller-systems-support</a> ·
    <a href="https://stripe.slack.com/archives/C09E79ZK3PS" target="_blank">#gtm-seller-systems-cpr</a> ·
    <a href="https://stripe.slack.com/archives/C0AEUHR9UC8" target="_blank">#stratus-support</a> ·
    Run: ${esc(d.run_date)}
  </div>
</div>
`;
}

function buildCategoryRows(d) {
  const main = d.categories.filter(c => !c.stratus);
  const stratus = d.categories.filter(c => c.stratus);
  let rows = main.map(c => categoryRow(c)).join('');
  if (stratus.length) {
    rows += `<tr><td colspan="7" style="padding:10px 0 4px; font-size:10px; font-weight:700; letter-spacing:0.8px; text-transform:uppercase; color:var(--text-3); border-bottom:1px solid var(--border); border-top:2px solid var(--border);">Stratus — #stratus-support · see deep dive below</td></tr>`;
    rows += stratus.map(c => categoryRow(c)).join('');
  }
  return rows;
}

function categoryRow(c) {
  const tag = c.tag ? ` <span style="font-size:10px;color:var(--${c.tag_color});font-weight:600;">${esc(c.tag)}</span>` : '';
  const channelLabel = c.channel === 'C0AEUHR9UC8' ? 'stratus' : 'channel';
  return `<tr>
    <td class="label">${esc(c.name)}${tag}</td>
    <td class="c">${c.w1}</td>
    <td class="c">${c.w2}</td>
    <td class="c ${deltaClass(c.delta_direction)}">${deltaArrow(c.delta_direction, c.delta)}</td>
    <td>${severityBadge(c.severity)}</td>
    <td style="font-size:11px;color:var(--text-3)">${esc(c.status)}</td>
    <td>${slackLink(c.channel, channelLabel)}</td>
  </tr>`;
}

function buildStratusSection(d) {
  const s = d.stratus;
  const wowClass = wowBadgeClass(s.delta_direction);
  const wowArrow = s.delta_direction === 'down' ? '↓' : s.delta_direction === 'up' ? '↑' : '→';
  return `
<div class="section" id="stratus">
  <div class="page">
    <div class="card" style="border-top:3px solid var(--purple-dark);">
      <div class="deep-dive-header">
        <div class="deep-dive-pill dp-stratus">Stratus Deep Dive</div>
        <div class="deep-dive-meta">
          <strong>W1: ${s.w1} issues → W2: ${s.w2} issues</strong> &nbsp;·&nbsp;
          <span class="wow-badge ${wowClass}" style="display:inline-flex;">${wowArrow} ${esc(s.delta)} WoW</span>
          &nbsp;·&nbsp; Sentiment: <span class="sentiment-pill s-${s.sentiment}">${esc(s.sentiment_label)}</span>
          &nbsp;·&nbsp; <a href="https://stripe.slack.com/archives/C0AEUHR9UC8" target="_blank">#stratus-support</a>
        </div>
      </div>
      <div class="deep-dive-grid">
        <div>
          <div class="deep-dive-col-title">Top Bugs &amp; Errors</div>
          ${s.bugs.map(b => `
          <div class="dd-item">
            <div class="dd-count">${b.count || '—'}</div>
            <div>
              <div class="dd-label">${esc(b.label)}</div>
              <div class="dd-detail">${esc(b.detail)}</div>
              ${b.quote ? `<div class="dd-quote">${esc(b.quote)}</div>` : ''}
            </div>
          </div>`).join('')}
          <div style="margin-top:16px;">
            <div class="deep-dive-col-title">Adoption Friction</div>
            ${s.friction.map(f => `
            <div class="dd-item">
              <div class="dd-count">—</div>
              <div><div class="dd-detail">${esc(f)}</div></div>
            </div>`).join('')}
          </div>
        </div>
        <div>
          <div class="deep-dive-col-title">Products Missing from Stratus</div>
          <div style="margin-bottom:14px;">
            ${s.missing_products.map(p => `<span class="product-tag tag-${p.severity[0]}">${esc(p.name)}</span>`).join('')}
          </div>
          <div style="background:var(--surface-2); border:1px solid var(--border); border-radius:6px; padding:14px 16px; margin-bottom:16px;">
            <div class="deep-dive-col-title" style="margin-bottom:10px;">What Stratus Needs to Fix</div>
            <ul class="priority-list">
              ${s.priorities.map((p, i) => `<li><div class="pn">${i+1}</div><div>${esc(p)}</div></li>`).join('')}
            </ul>
          </div>
          <div style="background:var(--purple-dim); border:1px solid rgba(99,91,255,0.2); border-radius:6px; padding:12px 14px;">
            <div style="font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:0.5px; color:var(--purple-dark); margin-bottom:6px;">Sentiment Signal</div>
            <div style="font-size:12px; color:var(--text-2); line-height:1.6;">${esc(s.sentiment_detail)}</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>`;
}

function buildApprovalsSection(d) {
  const a = d.approvals;
  const wowClass = wowBadgeClass(a.delta_direction);
  const wowArrow = a.delta_direction === 'down' ? '↓' : a.delta_direction === 'up' ? '↑' : '→';
  return `
<div class="section" id="approvals">
  <div class="page">
    <div class="card" style="border-top:3px solid var(--teal);">
      <div class="deep-dive-header">
        <div class="deep-dive-pill dp-approvals">Approvals Deep Dive</div>
        <div class="deep-dive-meta">
          <strong>W1: ${a.w1} issues → W2: ${a.w2} issues</strong> &nbsp;·&nbsp;
          <span class="wow-badge ${wowClass}" style="display:inline-flex;">${wowArrow} ${esc(a.delta)} · ${esc(a.note)}</span>
          &nbsp;·&nbsp; <a href="https://stripe.slack.com/archives/C05FDARJBA4" target="_blank">#seller-systems-support</a>
        </div>
      </div>
      <div class="deep-dive-grid">
        <div>
          <div class="deep-dive-col-title">Top Approval Blockers (W2)</div>
          ${a.blockers.map(b => `
          <div class="dd-item">
            <div class="dd-count">${b.count || '—'}</div>
            <div>
              <div class="dd-label">${esc(b.label)}</div>
              <div class="dd-detail">${esc(b.detail)}</div>
              ${b.quote ? `<div class="dd-quote">${esc(b.quote)}</div>` : ''}
            </div>
          </div>`).join('')}
        </div>
        <div>
          <div class="deep-dive-col-title">Cross-Functional Friction</div>
          ${a.cross_functional.map(f => `
          <div class="dd-item">
            <div class="dd-count">—</div>
            <div><div class="dd-detail">${esc(f)}</div></div>
          </div>`).join('')}
          <div style="margin-top:14px;">
            <div class="deep-dive-col-title">Exception vs Standard (W2)</div>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:14px;">
              <div style="background:var(--surface-2); border:1px solid var(--border); border-radius:6px; padding:12px; text-align:center;">
                <div style="font-size:20px; font-weight:700; color:var(--text-1);">${a.exception_breakdown.wrong_level}</div>
                <div style="font-size:10px; font-weight:600; color:var(--text-3); text-transform:uppercase; letter-spacing:0.5px; margin-top:3px;">${esc(a.exception_breakdown.wrong_level_label)}</div>
                <div style="font-size:10.5px; color:var(--text-3); margin-top:4px;">${esc(a.exception_breakdown.wrong_level_detail)}</div>
              </div>
              <div style="background:var(--surface-2); border:1px solid var(--border); border-radius:6px; padding:12px; text-align:center;">
                <div style="font-size:20px; font-weight:700; color:var(--text-1);">${a.exception_breakdown.auto_approve_fail}</div>
                <div style="font-size:10px; font-weight:600; color:var(--text-3); text-transform:uppercase; letter-spacing:0.5px; margin-top:3px;">${esc(a.exception_breakdown.auto_approve_label)}</div>
                <div style="font-size:10.5px; color:var(--text-3); margin-top:4px;">${esc(a.exception_breakdown.auto_approve_detail)}</div>
              </div>
            </div>
          </div>
          <div style="background:rgba(0,150,165,0.06); border:1px solid rgba(0,150,165,0.2); border-radius:6px; padding:12px 14px; margin-top:14px;">
            <div style="font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:0.5px; color:var(--teal); margin-bottom:8px;">What's Slowing the Approval Workflow</div>
            <ul class="priority-list">
              ${a.priorities.map((p, i) => `<li><div class="pn-teal">${i+1}</div><div>${esc(p)}</div></li>`).join('')}
            </ul>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>`;
}

function buildCharts(d) {
  const grid = '#E3E8EE', tick = '#8898AA';
  const tip = { backgroundColor:'#FFFFFF', borderColor:'#E3E8EE', borderWidth:1, titleColor:'#0A2540', bodyColor:'#425466', padding:10 };
  const f13 = { family: "-apple-system,'Inter',sans-serif", size: 12 };

  new Chart(document.getElementById('wowChart'), {
    type: 'bar',
    data: {
      labels: d.chart_categories,
      datasets: [
        { label: 'W2 (' + d.w2_label + ')', data: d.chart_w2, backgroundColor: 'rgba(99,91,255,0.3)', borderWidth: 0, borderRadius: 4 },
        { label: 'W1 (' + d.w1_label + ')', data: d.chart_w1, backgroundColor: 'rgba(0,163,196,0.35)', borderWidth: 0, borderRadius: 4 }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      barPercentage: 0.65, categoryPercentage: 0.75,
      plugins: { legend: { labels: { color:'#0A2540', font: {...f13, weight:'500'}, boxWidth:12, padding:18 } }, tooltip: tip },
      scales: {
        x: { ticks: { color: tick, font: f13, padding: 4 }, grid: { color: grid } },
        y: { ticks: { color: tick, font: f13, padding: 4 }, grid: { color: grid }, beginAtZero: true }
      }
    }
  });

  new Chart(document.getElementById('pulseChart'), {
    type: 'bar',
    data: {
      labels: d.chart_categories,
      datasets: [{
        label: 'W2 Count',
        data: d.chart_w2,
        backgroundColor: d.chart_w2.map((v, i) => {
          const max = Math.max(...d.chart_w2);
          const intensity = 0.2 + 0.4 * (v / max);
          return `rgba(223,27,65,${intensity})`;
        }),
        borderWidth: 0, borderRadius: 4
      }]
    },
    options: {
      indexAxis: 'y', responsive: true, maintainAspectRatio: false,
      barPercentage: 0.6, categoryPercentage: 0.8,
      plugins: { legend: { display: false }, tooltip: tip },
      scales: {
        x: { ticks: { color: tick, font: f13 }, grid: { color: grid }, beginAtZero: true },
        y: { ticks: { color: tick, font: f13 }, grid: { color: 'transparent' } }
      }
    }
  });
}

loadDashboard();
</script>
</body>
</html>
