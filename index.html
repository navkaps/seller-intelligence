<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Seller Systems Support Intelligence</title>
  <script src="./chart.min.js"></script>
  <style>
    :root {
      --bg:           #F6F9FC;
      --surface:      #FFFFFF;
      --surface-2:    #F6F9FC;
      --border:       #E3E8EE;
      --border-2:     #F0F4F8;
      --purple:       #635BFF;
      --purple-dim:   rgba(99,91,255,0.08);
      --purple-dark:  #4F46E5;
      --green:        #30B980;
      --green-dim:    rgba(48,185,128,0.08);
      --yellow:       #C27A00;
      --yellow-dim:   rgba(194,122,0,0.08);
      --red:          #DF1B41;
      --red-dim:      rgba(223,27,65,0.08);
      --orange:       #FF7B00;
      --orange-dim:   rgba(255,123,0,0.08);
      --teal:         #0096A5;
      --teal-dim:     rgba(0,150,165,0.08);
      --text-1:       #0A2540;
      --text-2:       #425466;
      --text-3:       #8898AA;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { overflow-x: auto; scroll-behavior: smooth; }
    .diff-badge { display: inline-flex; align-items: center; gap: 4px; font-size: 10px; font-weight: 700; padding: 3px 9px; border-radius: 20px; white-space: nowrap; }
    .diff-up   { background: var(--red-dim);   color: var(--red);   border: 1px solid rgba(223,27,65,0.25); }
    .diff-down { background: var(--green-dim); color: var(--green); border: 1px solid rgba(48,185,128,0.3); }
    .diff-flat { background: var(--surface-2); color: var(--text-3); border: 1px solid var(--border); }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", sans-serif;
      background: var(--bg); color: var(--text-2);
      min-height: 100vh; font-size: 13px; line-height: 1.5; min-width: 900px;
    }
    a { color: var(--purple); text-decoration: none; }
    a:hover { text-decoration: underline; }
    .page { max-width: 1360px; margin: 0 auto; padding: 0 28px; }

    /* Header */
    .header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 14px 0; }
    .header-inner { max-width: 1360px; margin: 0 auto; padding: 0 28px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
    .header-left { display: flex; align-items: center; gap: 14px; }
    .stripe-logo { width: 28px; height: 28px; background: var(--purple-dark); border-radius: 5px; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 800; color: white; }
    .header-title h1 { font-size: 15px; font-weight: 600; color: var(--text-1); }
    .header-title p  { font-size: 11px; color: var(--text-3); margin-top: 1px; }
    .header-right { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .run-badge { background: var(--purple-dim); border: 1px solid rgba(99,91,255,0.3); padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 600; color: var(--purple); }
    .ch-link { font-size: 11px; background: var(--surface-2); border: 1px solid var(--border); padding: 4px 10px; border-radius: 4px; }
    .ch-link a { color: var(--text-2); }

    /* Nav */
    .nav-bar { background: var(--surface); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
    .nav-inner { max-width: 1360px; margin: 0 auto; padding: 0 28px; display: flex; overflow-x: auto; }
    .nav-tab { font-size: 11px; font-weight: 600; color: var(--text-3); padding: 10px 14px; border-bottom: 2px solid transparent; white-space: nowrap; text-decoration: none; display: block; transition: color 0.15s; }
    .nav-tab:hover { color: var(--text-1); text-decoration: none; }
    .nav-tab.active { color: var(--purple); border-bottom-color: var(--purple); }

    /* Copy button */
    .copy-btn { display: inline-flex; align-items: center; gap: 3px; font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 4px; border: 1px solid var(--border); background: var(--surface-2); color: var(--text-3); cursor: pointer; transition: all 0.15s; line-height: 1.4; }
    .copy-btn:hover { background: var(--purple-dim); color: var(--purple); border-color: rgba(99,91,255,0.3); }
    .copy-btn.copied { background: var(--green-dim); color: var(--green); border-color: rgba(48,185,128,0.3); }

    .section { padding: 16px 0 0; }
    .section.last { padding-bottom: 32px; }

    /* BLUF */
    .bluf { background: var(--surface); border: 1px solid var(--border); border-left: 3px solid var(--purple); border-radius: 0 6px 6px 0; padding: 16px 20px; }
    .bluf-label { font-size: 10px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase; color: var(--purple); margin-bottom: 6px; }
    .bluf p { font-size: 13px; line-height: 1.8; color: var(--text-2); margin: 0 0 12px; }
    .bluf p:last-child { margin-bottom: 0; }
    .bluf strong { color: var(--text-1); font-weight: 700; }
    .bluf p .bluf-head { color: var(--purple); font-weight: 700; font-size: 13px; }

    /* KPIs */
    .kpi-row { display: grid; grid-template-columns: repeat(7, minmax(0, 1fr)); gap: 1px; background: var(--border); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
    .kpi { background: var(--surface); padding: 12px 14px; min-width: 0; overflow: hidden; }
    .kpi-label { font-size: 9.5px; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; color: var(--text-3); margin-bottom: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .kpi-value { font-size: 22px; font-weight: 700; color: var(--text-1); line-height: 1; }
    .kpi-sub { font-size: 10.5px; margin-top: 4px; }
    .up { color: var(--red); } .down { color: var(--green); } .flat { color: var(--text-3); }

    /* Pulse */
    .pulse-grid { display: grid; grid-template-columns: repeat(5, minmax(0, 1fr)); gap: 10px; }
    .pulse-card { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 14px 16px; }
    .pulse-card-label { font-size: 10px; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; color: var(--text-3); margin-bottom: 6px; }
    .pulse-card-issue { font-size: 12px; color: var(--text-1); font-weight: 600; line-height: 1.4; margin-bottom: 6px; }
    .pulse-card-detail { font-size: 11px; color: var(--text-2); line-height: 1.5; }
    .pulse-card-link { display: inline-block; margin-top: 8px; font-size: 10px; color: var(--purple); background: var(--purple-dim); border: 1px solid rgba(99,91,255,0.25); padding: 2px 8px; border-radius: 3px; text-decoration: none; font-weight: 500; }
    .pulse-r { border-top: 2px solid var(--red); }
    .pulse-o { border-top: 2px solid var(--orange); }
    .pulse-y { border-top: 2px solid var(--yellow); }
    .pulse-g { border-top: 2px solid var(--green); }
    .pulse-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
    .pulse-pill { font-size: 10px; font-weight: 700; letter-spacing: 0.8px; text-transform: uppercase; color: var(--red); background: var(--red-dim); border: 1px solid rgba(223,27,65,0.25); padding: 3px 10px; border-radius: 20px; }
    .pulse-meta { font-size: 11px; color: var(--text-3); }
    .pulse-meta strong { color: var(--text-1); }

    /* Card */
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 20px 22px; }
    .card-title { font-size: 10px; font-weight: 700; letter-spacing: 0.8px; text-transform: uppercase; color: var(--text-3); margin-bottom: 16px; }

    /* Issue table */
    .tbl-wrap { overflow-x: auto; }
    .tbl { width: 100%; border-collapse: collapse; min-width: 760px; }
    .tbl th { font-size: 10px; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; color: rgba(255,255,255,0.85); text-align: left; padding: 8px 10px 8px 0; background: var(--purple-dark); }
    .tbl th:first-child { padding-left: 10px; }
    .tbl th.c { text-align: center; }
    .tbl td { padding: 9px 10px 9px 0; font-size: 12px; color: var(--text-2); border-bottom: 1px solid var(--border-2); vertical-align: middle; }
    .tbl tr:last-child td { border-bottom: none; }
    .tbl td.label { color: var(--text-1); font-weight: 500; }
    .tbl td.c { text-align: center; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 10px; font-weight: 600; white-space: nowrap; }
    .b-crit { background: var(--red-dim); color: var(--red); border: 1px solid rgba(223,27,65,0.25); }
    .b-high { background: var(--orange-dim); color: var(--orange); border: 1px solid rgba(196,77,0,0.25); }
    .b-med  { background: var(--yellow-dim); color: var(--yellow); border: 1px solid rgba(194,122,0,0.25); }
    .b-low  { background: var(--green-dim); color: var(--green); border: 1px solid rgba(14,138,95,0.25); }
    .t-up   { color: var(--red); font-weight: 700; }
    .t-flat { color: var(--text-3); }
    .t-down { color: var(--green); font-weight: 700; }
    .sl { display: inline-flex; align-items: center; font-size: 10px; color: var(--purple); background: var(--purple-dim); border: 1px solid rgba(99,91,255,0.25); padding: 2px 7px; border-radius: 3px; text-decoration: none; font-weight: 500; white-space: nowrap; }

    /* Two-col */
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

    /* Actions */
    .action { display: flex; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border-2); align-items: flex-start; }
    .action:last-child { border-bottom: none; }
    .action-n { width: 20px; height: 20px; min-width: 20px; background: var(--purple-dim); border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; color: var(--purple); }
    .action-body { font-size: 12px; color: var(--text-2); line-height: 1.5; }
    .action-body strong { color: var(--text-1); }
    .action-owner { font-size: 10px; color: var(--text-3); margin-top: 2px; }

    /* Watchlist */
    .watch { display: flex; gap: 10px; padding: 9px 0; border-bottom: 1px solid var(--border-2); align-items: flex-start; }
    .watch:last-child { border-bottom: none; }
    .dot { width: 6px; height: 6px; min-width: 6px; border-radius: 50%; margin-top: 5px; }
    .dot-red    { background: var(--red); }
    .dot-orange { background: var(--orange); }
    .dot-yellow { background: var(--yellow); }
    .watch-text { font-size: 12px; color: var(--text-2); line-height: 1.5; }

    /* Deep Dive */
    .deep-dive-header { display: flex; align-items: center; gap: 12px; margin-bottom: 18px; padding-bottom: 14px; border-bottom: 1px solid var(--border-2); flex-wrap: wrap; }
    .deep-dive-pill { font-size: 11px; font-weight: 700; letter-spacing: 0.8px; text-transform: uppercase; padding: 4px 12px; border-radius: 20px; white-space: nowrap; }
    .dp-stratus  { background: var(--purple-dim); color: var(--purple-dark); border: 1px solid rgba(79,70,229,0.3); }
    .dp-approvals{ background: var(--teal-dim);   color: var(--teal);        border: 1px solid rgba(0,150,165,0.3); }
    .deep-dive-meta { font-size: 12px; color: var(--text-3); line-height: 1.5; }
    .deep-dive-meta strong { color: var(--text-1); }
    .deep-dive-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .deep-dive-col-title { font-size: 10px; font-weight: 700; letter-spacing: 0.6px; text-transform: uppercase; color: var(--text-3); margin-bottom: 10px; }
    .dd-item { display: flex; gap: 8px; padding: 8px 0; border-bottom: 1px solid var(--border-2); align-items: flex-start; }
    .dd-item:last-child { border-bottom: none; }
    .dd-count { min-width: 22px; height: 22px; background: var(--surface-2); border: 1px solid var(--border); border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; color: var(--text-2); flex-shrink: 0; }
    .dd-label  { font-size: 12px; color: var(--text-1); font-weight: 500; line-height: 1.4; }
    .dd-detail { font-size: 11px; color: var(--text-3); line-height: 1.5; margin-top: 1px; }
    .dd-quote  { font-size: 10.5px; color: var(--text-3); font-style: italic; background: var(--surface-2); border-left: 2px solid var(--border); padding: 4px 8px; margin-top: 4px; border-radius: 0 3px 3px 0; }
    .sentiment-pill { display: inline-block; font-size: 10px; font-weight: 700; padding: 3px 10px; border-radius: 20px; letter-spacing: 0.5px; }
    .s-positive { background: var(--green-dim);  color: var(--green);  border: 1px solid rgba(48,185,128,0.3); }
    .s-mixed    { background: var(--yellow-dim); color: var(--yellow); border: 1px solid rgba(194,122,0,0.3); }
    .s-negative { background: var(--red-dim);    color: var(--red);    border: 1px solid rgba(223,27,65,0.3); }
    .wow-badge  { display: inline-flex; align-items: center; gap: 6px; font-size: 11px; font-weight: 600; padding: 4px 12px; border-radius: 6px; }
    .wow-up   { background: var(--red-dim);    color: var(--red);    border: 1px solid rgba(223,27,65,0.25); }
    .wow-down { background: var(--green-dim);  color: var(--green);  border: 1px solid rgba(48,185,128,0.3); }
    .wow-flat { background: var(--yellow-dim); color: var(--yellow); border: 1px solid rgba(194,122,0,0.3); }
    .product-tag { display: inline-block; font-size: 10.5px; padding: 2px 9px; border-radius: 20px; font-weight: 600; margin: 2px; }
    .tag-missing { background: var(--red-dim);    color: var(--red);    border: 1px solid rgba(220,38,38,0.2); }
    .tag-broken  { background: var(--orange-dim); color: var(--orange); border: 1px solid rgba(234,93,42,0.2); }
    .tag-gap     { background: var(--yellow-dim); color: var(--yellow); border: 1px solid rgba(217,119,6,0.2); }
    .priority-list { list-style: none; }
    .priority-list li { display: flex; gap: 8px; padding: 7px 0; border-bottom: 1px solid var(--border-2); font-size: 12px; color: var(--text-2); line-height: 1.5; }
    .priority-list li:last-child { border-bottom: none; }
    .pn      { min-width: 18px; height: 18px; background: var(--purple-dim); border-radius: 3px; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; color: var(--purple); margin-top: 1px; flex-shrink: 0; }
    .pn-teal { min-width: 18px; height: 18px; background: var(--teal-dim);   border-radius: 3px; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; color: var(--teal);   margin-top: 1px; flex-shrink: 0; }

    /* Footer */
    .footer { padding: 14px 0 32px; font-size: 11px; color: var(--text-3); border-top: 1px solid var(--border); margin-top: 20px; }
    .footer-inner { max-width: 1360px; margin: 0 auto; padding: 0 28px; }

    canvas { max-height: 360px; }

    /* Loading / error */
    #loading { display: flex; align-items: center; justify-content: center; min-height: 60vh; flex-direction: column; gap: 12px; }
    .spinner { width: 24px; height: 24px; border: 2px solid var(--border); border-top-color: var(--purple); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #app { display: none; }
  </style>
</head>
<body>

<div id="loading"><div class="spinner"></div><p style="color:var(--text-3);font-size:13px">Loading dashboard…</p></div>
<div id="app"></div>

<script>
// ─── HELPERS ─────────────────────────────────────────────────────────────────
function h(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Parse **bold** markdown → HTML (safe: only trusted JSON content)
function bold(text) {
  return String(text).split(/\*\*([^*]+)\*\*/g)
    .map((p, i) => i % 2 === 0 ? h(p) : `<strong>${h(p)}</strong>`)
    .join('');
}

// WoW computed values
function wowPct(w1, w2) {
  if (w1 === 0) return w2 > 0 ? '+∞' : '0%';
  const p = Math.round(((w2 - w1) / w1) * 100);
  return (p >= 0 ? '+' : '') + p + '%';
}
function wowArrow(w1, w2) {
  if (w1 === 0) return w2 > 0 ? '↑↑' : '→';
  const p = ((w2 - w1) / w1) * 100;
  if (p > 100) return '↑↑';
  if (p > 15)  return '↑';
  if (p < -15) return '↓';
  return '→';
}
function wowClass(w1, w2) {
  if (w1 === 0) return w2 > 0 ? 't-up' : 't-flat';
  const p = ((w2 - w1) / w1) * 100;
  if (p > 15)  return 't-up';
  if (p < -15) return 't-down';
  return 't-flat';
}
function kpiColor(w1, w2) {
  const p = w1 === 0 ? (w2 > 0 ? 999 : 0) : ((w2 - w1) / w1) * 100;
  if (p > 15)  return 'up';
  if (p < -15) return 'down';
  return 'flat';
}
function wowBadgeClass(w1, w2) {
  const p = w1 === 0 ? 999 : ((w2 - w1) / w1) * 100;
  if (p > 15)  return 'wow-up';
  if (p < -15) return 'wow-down';
  return 'wow-flat';
}

function sevClass(s)  { return { crit:'b-crit', high:'b-high', med:'b-med', low:'b-low' }[s] || 'b-low'; }
function sevLabel(s)  { return { crit:'Critical', high:'High', med:'Medium', low:'Low' }[s] || s; }
function dotClass(s)  { return `dot-${s}`; }

function slackLink(url) {
  if (!url) return '<span style="color:var(--text-3);font-size:11px">—</span>';
  const isMsg = /\/p\d{10,}/.test(url);
  const chName = url.includes('C05FDARJBA4') ? '#seller-systems'
               : url.includes('C0AEUHR9UC8') ? '#stratus'
               : '#channel';
  const label = isMsg ? '→ thread ↗' : `${chName} ↗`;
  return `<a class="sl" href="${h(url)}" target="_blank">${label}</a>`;
}

// ─── RENDER ──────────────────────────────────────────────────────────────────
function render(d) {
  const allCats   = d.categories || [];
  const stratCats = d.stratus_categories || [];
  const sfdcQueues = ((d.sfdc||{}).queues||[]);
  const sfdcW2    = sfdcQueues.reduce((s,q) => s + (q.w2||0), 0);
  const sfdcW1    = sfdcQueues.reduce((s,q) => s + (q.w1||0), 0);
  const w2total   = allCats.reduce((s,c) => s + c.w2, 0) + stratCats.reduce((s,c) => s + c.w2, 0);
  const w1total   = allCats.reduce((s,c) => s + c.w1, 0) + stratCats.reduce((s,c) => s + c.w1, 0);

  // Biggest spike (main categories only, exclude infinite)
  const spike = allCats.filter(c => c.w1 > 0).reduce((best, c) => {
    const p = ((c.w2 - c.w1) / c.w1) * 100;
    return p > best.p ? { p, label: wowPct(c.w1, c.w2) + ' ' + c.name } : best;
  }, { p: -Infinity, label: '—' });

  // Approval blocks
  const approvalCat  = allCats.find(c => c.name.toLowerCase().includes('approval')) || {};
  const stratusTotal = stratCats.reduce((s,c) => s + c.w2, 0);

  const m = d.meta || {};
  const note = m.run_note ? ` · ${h(m.run_note)}` : '';
  const channels = (m.channels || []).map(c =>
    `<div class="ch-link"><a href="${h(c.url)}" target="_blank">#${h(c.name)} ↗</a></div>`
  ).join('');
  const prevTotal = m.prev_w2_total;
  const diffBadge = (typeof prevTotal === 'number') ? (() => {
    const diff = w2total - prevTotal;
    const cls = diff > 0 ? 'diff-up' : diff < 0 ? 'diff-down' : 'diff-flat';
    const sign = diff > 0 ? '+' : '';
    return `<div class="diff-badge ${cls}">${sign}${diff} vs last run</div>`;
  })() : '';

  const app = document.getElementById('app');
  app.innerHTML = `
<!-- HEADER -->
<div class="header">
  <div class="header-inner">
    <div class="header-left">
      <div class="stripe-logo">S</div>
      <div class="header-title">
        <h1>Seller Systems Support Intelligence</h1>
        <p>${h(m.period||'')} · W1 (${h((m.w1||{}).label||'')}) vs W2 (${h((m.w2||{}).label||'')}) · Run: ${h(m.run_date||'')}${note}</p>
      </div>
    </div>
    <div class="header-right">
      ${channels}
      ${diffBadge}
      <div class="run-badge">${h(m.run_date||'')}${note}</div>
    </div>
  </div>
</div>

<!-- NAV -->
<div class="nav-bar">
  <div class="nav-inner">
    <a class="nav-tab active" href="#overview">Overview</a>
    <a class="nav-tab" href="#issues">Issue Breakdown</a>
    <a class="nav-tab" href="#sfdc">SFDC Cases</a>
    <a class="nav-tab" href="#stratus">Stratus Deep Dive</a>
    <a class="nav-tab" href="#approvals">Approvals Deep Dive</a>
    <a class="nav-tab" href="#quotes">Critical Quotes</a>
    <a class="nav-tab" href="#actions">Actions &amp; Watchlist</a>
  </div>
</div>

<!-- BLUF -->
<div class="section" id="overview"><div class="page">
  <div class="bluf">
    <div class="bluf-label">BLUF — ${h(m.run_date||'')}${note}</div>
    ${(d.bluf||'').split('\n\n').map(para => {
      const rendered = String(para).split(/\*\*([^*]+)\*\*/g)
        .map((p, i) => i % 2 === 0 ? h(p) : `<span class="bluf-head">${h(p)}</span>`)
        .join('');
      return `<p>${rendered}</p>`;
    }).join('')}
  </div>
</div></div>

<!-- KPIs -->
<div class="section"><div class="page">
  <div class="kpi-row">
    <div class="kpi">
      <div class="kpi-label">W2 Total (${h((m.w2||{}).label||'')})</div>
      <div class="kpi-value">${w2total}</div>

function categoryRow(c) {
  const flags = (c.flags||[]).map(f => `<span style="font-size:10px;color:var(--red);font-weight:600;margin-left:4px;">${h(f)}</span>`).join('');
  const delta = wowPct(c.w1, c.w2);
  const arrow = wowArrow(c.w1, c.w2);
  const cls   = wowClass(c.w1, c.w2);
  const resolvedBadge = c.resolved
    ? `<span style="font-size:10px;color:#16a34a;background:rgba(34,197,94,0.1);border:1px solid rgba(34,197,94,0.3);padding:1px 7px;border-radius:10px;font-weight:600;margin-left:6px;">✓ Resolved</span>`
    : '';
  const threads = c.threads || [];
  const hasThreads = threads.length > 0;
  const expandIcon = hasThreads ? `<span style="font-size:10px;color:var(--text-3);margin-left:6px;opacity:0.6;">▶</span>` : '';
  const rowId = 'row-' + encodeURIComponent(c.name).replace(/%/g,'_');
  const detailId = 'detail-' + encodeURIComponent(c.name).replace(/%/g,'_');

  const threadCards = threads.map(t => {
    const resIcon = t.resolved
      ? `<span style="font-size:10px;color:#16a34a;background:rgba(34,197,94,0.1);border:1px solid rgba(34,197,94,0.3);padding:1px 6px;border-radius:8px;font-weight:600;white-space:nowrap;">✓ resolved</span>`
      : `<span style="font-size:10px;color:var(--orange);background:rgba(251,146,60,0.1);border:1px solid rgba(251,146,60,0.3);padding:1px 6px;border-radius:8px;font-weight:600;white-space:nowrap;">open</span>`;
    const slk = t.slack_link
      ? `<a href="${h(t.slack_link)}" target="_blank" style="font-size:10px;color:var(--purple);font-weight:500;text-decoration:none;white-space:nowrap;">→ thread ↗</a>`
      : '';
    const note = t.resolution_note
      ? `<div style="font-size:11px;color:#16a34a;margin-top:4px;font-style:italic;">${h(t.resolution_note)}</div>`
      : '';
    return `<div style="background:var(--bg-2,#f8f8f8);border:1px solid var(--border);border-radius:8px;padding:10px 12px;margin-bottom:8px;">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap;">
        <span style="font-size:11px;font-weight:700;color:var(--text-1);">${h(t.author||'')}</span>
        ${resIcon}
        ${slk}
      </div>
      <div style="font-size:12px;color:var(--text-2);font-style:italic;line-height:1.5;">"${h(t.quote||'')}"</div>
      ${note}
    </div>`;
  }).join('');

  const detailRow = hasThreads ? `<tr id="${detailId}" style="display:none;">
    <td colspan="7" style="padding:0;border-bottom:2px solid var(--border);">
      <div style="padding:12px 16px;background:linear-gradient(to bottom,rgba(99,102,241,0.04),transparent);">
        <div style="font-size:11px;font-weight:700;letter-spacing:0.7px;text-transform:uppercase;color:var(--text-3);margin-bottom:10px;">Threads this week</div>
        ${threadCards}
      </div>
    </td>
  </tr>` : '';

  const mainRow = `<tr id="${rowId}" ${hasThreads ? `onclick="toggleDetail('${detailId}','${rowId}')" style="cursor:pointer;"` : ''}>
    <td class="label" style="padding-left:10px">${h(c.name)}${flags}${resolvedBadge}${expandIcon}</td>
    <td class="c">${c.w1}</td>
    <td class="c">${c.w2}</td>
    <td class="c ${cls}">${arrow} ${delta}</td>
    <td><span class="badge ${sevClass(c.severity)}">${sevLabel(c.severity)}</span></td>
    <td style="font-size:11px;color:var(--text-3)">${h(c.note || c.status || '')}</td>
    <td>${slackLink(c.link)}</td>
  </tr>`;

  return mainRow + detailRow;
}

function toggleDetail(detailId, rowId) {
  const detail = document.getElementById(detailId);
  const row = document.getElementById(rowId);
  if (!detail) return;
  const isOpen = detail.style.display !== 'none';
  detail.style.display = isOpen ? 'none' : 'table-row';
  const icon = row ? row.querySelector('span[style*="▶"], span[style*="▼"]') : null;
  if (icon) icon.textContent = isOpen ? '▶' : '▼';
}

          const statusBadge = isResolved
            ? `<span style="font-size:10px;color:#16a34a;background:rgba(34,197,94,0.1);border:1px solid rgba(34,197,94,0.3);padding:1px 7px;border-radius:10px;font-weight:600;">✓ Resolved</span>`
            : '';
          const resolutionNote = isResolved && b.resolution_note
            ? `<div style="font-size:11px;color:#16a34a;margin-top:3px;font-style:italic;">${h(b.resolution_note)}</div>`
            : '';
          const threadLink = b.link
            ? `<a href="${h(b.link)}" target="_blank" style="font-size:10px;color:var(--purple);font-weight:500;white-space:nowrap;text-decoration:none;">→ thread ↗</a>`

          <div style="flex:1;min-width:0;">
            <div class="dd-label" style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;">
              <span>${h(b.bug||b.title||'')}</span>${statusBadge}${threadLink}
            </div>
            ${!isResolved && b.status ? `<div class="dd-detail">${h(b.status)}</div>` : ''}
            ${resolutionNote}
            ${b.quote ? `<div class="dd-quote">${h(b.quote)}</div>` : ''}

        </div>`;
        }).join('')}
        <div style="margin-top:16px;">
          <div class="deep-dive-col-title">Adoption Friction</div>
          ${friction.map(f => {
            const title  = typeof f === 'string' ? f : (f.text||f.title||'');
            const detail = typeof f === 'string' ? '' : (f.detail||'');
            const link   = typeof f === 'string' ? '' : (f.link||'');
            const linkEl = link ? `<a href="${h(link)}" target="_blank" style="font-size:10px;color:var(--purple);font-weight:500;white-space:nowrap;text-decoration:none;margin-left:6px;">→ thread ↗</a>` : '';

            </div>

          }).join('')}
        </div>
      </div>
      <div>
        ${(s.missing_products||[]).length ? `

        <div style="margin-bottom:14px;">

        </div>
        <div style="font-size:10.5px;color:var(--text-3);margin-bottom:16px;line-height:1.6;">
          <strong style="color:var(--text-2);">Red</strong> = missing &nbsp;·&nbsp;
          <strong style="color:var(--text-2);">Orange</strong> = broken &nbsp;·&nbsp;

        ${priorities.length ? `

          <div class="deep-dive-col-title" style="margin-bottom:10px;">What Stratus Needs to Fix</div>
          <ul class="priority-list">
            ${priorities.map((p,i) => `<li><div class="pn">${i+1}</div><div>${bold(p)}</div></li>`).join('')}

function buildCharts(d) {
  const cats = [...(d.categories||[]), ...(d.stratus_categories||[])];
  const labels = cats.map(c => c.name.replace(' in DC','').replace(' / ','/ '));
  const w1data  = cats.map(c => c.w1);
  const w2data  = cats.map(c => c.w2);
  const m = d.meta || {};

  const tip = { backgroundColor:'#fff', borderColor:'#E3E8EE', borderWidth:1, titleColor:'#0A2540', bodyColor:'#425466', padding:10 };
  const f   = { family:"-apple-system,'Inter',sans-serif", size:11 };
  const tick = '#8898AA', grid = '#E3E8EE';

  new Chart(document.getElementById('wowChart'), {
    type: 'bar',
    data: {
      labels,
      datasets: [
        { label: `W2 (${(m.w2||{}).label||''})`, data: w2data, backgroundColor: 'rgba(99,91,255,0.3)', borderWidth:0, borderRadius:4 },
        { label: `W1 (${(m.w1||{}).label||''})`, data: w1data, backgroundColor: 'rgba(0,163,196,0.35)', borderWidth:0, borderRadius:4 }
      ]
    },
    options: {
      responsive:true, maintainAspectRatio:false,
      barPercentage:0.65, categoryPercentage:0.75,
      plugins: { legend:{ labels:{ color:'#0A2540', font:{...f,weight:'500'}, boxWidth:12, padding:16 } }, tooltip:tip },
      scales: {
        x: { ticks:{ color:tick, font:f }, grid:{ color:grid } },
        y: { ticks:{ color:tick, font:f }, grid:{ color:grid }, beginAtZero:true }
      }
    }
  });

  // Color by severity: crit=red, high=orange, med=yellow, low=green
  const sevColors = {
    crit:  'rgba(223,27,65,0.45)',
    high:  'rgba(255,123,0,0.4)',
    med:   'rgba(194,122,0,0.35)',
    low:   'rgba(48,185,128,0.35)'
  };
  const barColors = cats.map(c => sevColors[c.severity] || sevColors.low);

  new Chart(document.getElementById('distChart'), {
    type: 'bar',
    data: {
      labels,
      datasets: [{ label:'W2 Count', data:w2data, backgroundColor:barColors, borderWidth:0, borderRadius:4 }]
    },
    options: {
      indexAxis:'y', responsive:true, maintainAspectRatio:false,
      barPercentage:0.6, categoryPercentage:0.8,
      plugins: { legend:{ display:false }, tooltip:tip },
      scales: {
        x: { ticks:{ color:tick, font:f }, grid:{ color:grid }, beginAtZero:true },
        y: { ticks:{ color:tick, font:{ ...f, size:10 } }, grid:{ color:'transparent' } }
      }
    }
  });
}
